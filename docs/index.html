<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inference Cache Gateway — Dane Wu</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 32px; max-width: 1100px; margin: 0 auto; line-height: 1.7; font-size: 1.05rem; }
  h1 { font-size: 2rem; color: #38bdf8; margin-bottom: 6px; }
  .subtitle { color: #94a3b8; margin-bottom: 8px; font-size: 1.05rem; }
  .author { color: #64748b; margin-bottom: 32px; font-size: 0.95rem; }
  .author strong { color: #e2e8f0; }
  section { scroll-margin-top: 150px; }
  h2 { font-size: 1.4rem; color: #38bdf8; margin: 36px 0 14px; padding-bottom: 8px; border-bottom: 1px solid #1e293b; }
  h3 { font-size: 1.15rem; color: #f59e0b; margin: 24px 0 10px; }
  p { margin-bottom: 14px; color: #cbd5e1; font-size: 1.05rem; }
  code { background: #1e293b; padding: 2px 8px; border-radius: 3px; font-size: 0.95rem; color: #38bdf8; }
  pre { background: #1e293b; border-radius: 8px; padding: 18px; overflow-x: auto; margin: 14px 0; font-size: 0.92rem; line-height: 1.6; color: #e2e8f0; }
  a { color: #38bdf8; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .comment { color: #64748b; }
  .keyword { color: #c084fc; }
  .string { color: #34d399; }
  .number { color: #f59e0b; }
  .highlight { color: #f59e0b; font-weight: 600; }

  /* Nav hint */
  .nav-hint { color: #38bdf8; font-size: 1.3rem; font-weight: 600; margin-bottom: 12px; animation: hint-glow 1.8s ease-in-out infinite; background: #0f172a; padding-top: 14px; }
  .nav-hint.scrolled { font-size: 1.05rem; color: #94a3b8; animation: none; text-shadow: none; }
  @keyframes hint-glow {
    0%, 100% { text-shadow: 0 0 8px rgba(56, 189, 248, 0.4); }
    50% { text-shadow: 0 0 20px rgba(56, 189, 248, 0.9), 0 0 40px rgba(56, 189, 248, 0.4); }
  }

  /* Nav */
  .nav-wrap { background: #0f172a; border-bottom: 1px solid #1e293b; margin-bottom: 28px; }
  .nav-wrap.fixed { position: fixed; top: 0; left: 0; right: 0; padding: 14px 32px; z-index: 100; border-bottom: 1px solid #1e293b; }
  .nav-wrap.fixed .nav-inner { max-width: 1036px; margin: 0 auto; }
  .nav { padding: 14px 0; display: block; }
  .nav-wrap.fixed .nav { padding: 0; }
  .nav .nav-group + .nav-group { margin-top: 6px; }
  .nav .nav-group { width: 100%; }
  .nav a { color: #94a3b8; text-decoration: none; font-size: 0.88rem; padding: 5px 12px; border-radius: 5px; border: 1px solid #334155; transition: all 0.2s; white-space: nowrap; }
  .nav a:hover { color: #38bdf8; border-color: #38bdf8; background: #334155; text-decoration: none; }
  .nav-sep { color: #475569; font-size: 1rem; padding: 0 6px; user-select: none; font-weight: 300; display: none; }
  .nav-group { display: flex; gap: 6px; align-items: center; flex-wrap: nowrap; width: 100%; }
  .nav-group-label { color: #38bdf8; font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; padding: 4px 10px; background: #1e293b; border-radius: 4px; border: 1px solid #334155; white-space: nowrap; }
  .nav a.nav-featured { font-weight: 600; border-color: #f59e0b; color: #f59e0b; }
  .nav a.nav-featured:hover { border-color: #fbbf24; color: #fbbf24; background: #f59e0b15; }
  .nav a.nav-featured.active { background: #f59e0b; color: #0f172a; border-color: #f59e0b; }
  .nav a.idle { border-color: #38bdf8; color: #38bdf8; animation: nav-idle-pulse 2s ease-in-out infinite; }
  .nav a.idle:nth-of-type(2) { animation-delay: 0.12s; }
  .nav a.idle:nth-of-type(3) { animation-delay: 0.24s; }
  .nav a.idle:nth-of-type(4) { animation-delay: 0.36s; }
  .nav a.idle:nth-of-type(5) { animation-delay: 0.48s; }
  .nav a.idle:nth-of-type(6) { animation-delay: 0.60s; }
  .nav a.idle:nth-of-type(7) { animation-delay: 0.72s; }
  .nav a.idle:nth-of-type(8) { animation-delay: 0.84s; }
  .nav a.idle:nth-of-type(9) { animation-delay: 0.96s; }
  .nav a.idle:nth-of-type(10) { animation-delay: 1.08s; }
  .nav a.idle:nth-of-type(11) { animation-delay: 1.20s; }
  .nav a.idle:nth-of-type(12) { animation-delay: 1.32s; }
  .nav a.idle:nth-of-type(13) { animation-delay: 1.44s; }
  .nav a.idle:nth-of-type(14) { animation-delay: 1.56s; }
  .nav a.idle:nth-of-type(15) { animation-delay: 1.68s; }
  .nav a.idle:nth-of-type(16) { animation-delay: 1.80s; }
  .nav a.idle:nth-of-type(17) { animation-delay: 1.92s; }
  @keyframes nav-idle-pulse {
    0%, 100% { box-shadow: 0 0 6px rgba(56, 189, 248, 0.2); transform: scale(1); }
    50% { box-shadow: 0 0 16px rgba(56, 189, 248, 0.5), 0 0 32px rgba(56, 189, 248, 0.2); transform: scale(1.03); }
  }
  .nav a.active { color: #fff; background: #0ea5e9; border-color: #fff; border-width: 2px; animation: nav-active-glow 1.5s ease-in-out infinite; }
  @keyframes nav-active-glow {
    0%, 100% { box-shadow: 0 0 10px rgba(14, 165, 233, 0.6), 0 0 30px rgba(14, 165, 233, 0.3); transform: scale(1); }
    50% { box-shadow: 0 0 20px rgba(14, 165, 233, 1), 0 0 50px rgba(14, 165, 233, 0.6), 0 0 80px rgba(14, 165, 233, 0.25); transform: scale(1.06); }
  }

  /* Cards */
  .card { background: #1e293b; border-radius: 8px; padding: 22px; margin-bottom: 18px; border-left: 4px solid #334155; }
  .card.blue { border-left-color: #38bdf8; }
  .card.yellow { border-left-color: #f59e0b; }
  .card.green { border-left-color: #10b981; }
  .card.red { border-left-color: #ef4444; }
  .card.purple { border-left-color: #8b5cf6; }
  .card h4 { font-size: 1rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
  .card p { margin-bottom: 10px; }
  .card p:last-child { margin-bottom: 0; }

  /* Results hero */
  .tldr-hero { margin-bottom: 32px; position: relative; }
  .tldr-hero h2 { font-size: 1.4rem; color: #38bdf8; margin-bottom: 18px; padding-bottom: 8px; border-bottom: 1px solid #1e293b; }
  .tldr-stats { display: flex; flex-direction: column; gap: 12px; position: relative; }
  .tldr-stat { background: #1e293b; border-radius: 12px; padding: 18px 28px; border: 1px solid #334155; display: flex; align-items: center; gap: 24px; animation: stat-glow 3s ease-in-out infinite; }
  .tldr-stat:nth-child(1) { animation-delay: 0s; }
  .tldr-stat:nth-child(2) { animation-delay: 0.75s; }
  .tldr-stat:nth-child(3) { animation-delay: 1.5s; }
  .tldr-stat:nth-child(4) { animation-delay: 2.25s; }
  @keyframes stat-glow {
    0%, 100% { box-shadow: 0 0 0 rgba(56, 189, 248, 0); border-color: #334155; }
    50% { box-shadow: 0 0 20px var(--glow-color, rgba(56, 189, 248, 0.3)), 0 0 40px var(--glow-color, rgba(56, 189, 248, 0.1)); border-color: var(--border-color, #38bdf8); }
  }
  .tldr-stat .num { font-size: 2rem; font-weight: 800; min-width: 120px; text-align: right; line-height: 1; flex-shrink: 0; }
  .tldr-stat .stat-text { display: flex; flex-direction: column; }
  .tldr-stat .label { font-size: 0.95rem; color: #e2e8f0; font-weight: 600; }
  .tldr-stat .desc { font-size: 0.8rem; color: #64748b; margin-top: 3px; line-height: 1.3; }
  .tldr-stat.green { --glow-color: rgba(16, 185, 129, 0.25); --border-color: #10b981; }
  .tldr-stat.blue { --glow-color: rgba(56, 189, 248, 0.25); --border-color: #38bdf8; }
  .tldr-stat.yellow { --glow-color: rgba(245, 158, 11, 0.25); --border-color: #f59e0b; }
  .tldr-stat.purple { --glow-color: rgba(167, 139, 250, 0.25); --border-color: #a78bfa; }
  .tldr-stat.pink { --glow-color: rgba(236, 72, 153, 0.30); --border-color: #ec4899; }
  .tldr-stat.green .num { color: #10b981; }
  .tldr-stat.yellow .num { color: #f59e0b; }
  .tldr-stat.blue .num { color: #38bdf8; }
  .tldr-stat.purple .num { color: #a78bfa; }
  .tldr-stat.pink .num { color: #ec4899; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 0.95rem; }
  th { text-align: left; padding: 10px 14px; background: #1e293b; color: #94a3b8; border-bottom: 1px solid #334155; }
  td { padding: 10px 14px; border-bottom: 1px solid #1e293b; color: #cbd5e1; }
  tr:hover td { background: #1e293b; }
  .status-badge { padding: 3px 10px; border-radius: 4px; font-size: 0.9rem; font-weight: 600; }
  .s-200 { background: #10b98120; color: #10b981; }
  .s-400 { background: #64748b20; color: #94a3b8; }
  .s-401 { background: #f59e0b20; color: #f59e0b; }
  .s-429 { background: #f59e0b20; color: #f59e0b; }
  .s-502 { background: #ef444420; color: #ef4444; }
  .s-504 { background: #8b5cf620; color: #8b5cf6; }
  .s-500 { background: #ef444420; color: #ef4444; }

  /* Math */
  .math { background: #1e293b; border-radius: 6px; padding: 14px 20px; font-family: monospace; font-size: 1rem; margin: 10px 0; color: #f59e0b; text-align: center; }

  /* Funnel */
  .mechanisms-hero { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 2px solid #38bdf8; border-radius: 16px; padding: 36px 32px 28px; margin-bottom: 18px; position: relative; overflow: hidden; }
  .mechanisms-hero::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at 30% 40%, rgba(56,189,248,0.06) 0%, transparent 50%); pointer-events: none; }
  .mechanisms-title { font-size: 1.6rem; font-weight: 700; color: #fff; text-align: center; margin-bottom: 6px; }
  .mechanisms-subtitle { font-size: 1rem; color: #94a3b8; text-align: center; margin-bottom: 28px; }
  .funnel { display: flex; flex-direction: column; align-items: center; gap: 0; margin-bottom: 28px; }
  .funnel-entry { text-align: center; color: #94a3b8; font-size: 0.95rem; margin-bottom: 4px; }
  .funnel-entry .big { font-size: 1.5rem; font-weight: 700; color: #e2e8f0; display: block; }
  .funnel-arrow { color: #475569; font-size: 1.1rem; padding: 4px 0; }
  .funnel-arrow .blocked { font-size: 0.8rem; margin-left: 8px; }
  .funnel-layer { display: flex; align-items: center; gap: 0; width: 100%; max-width: 700px; }
  .funnel-layer-num { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 800; flex-shrink: 0; }
  .funnel-layer-body { flex: 1; display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-radius: 10px; margin-left: 12px; border: 2px solid; }
  .funnel-layer-left { display: flex; flex-direction: column; }
  .funnel-layer-label { font-size: 1.15rem; font-weight: 700; color: #fff; }
  .funnel-layer-code { font-size: 0.78rem; color: #64748b; font-family: monospace; margin-top: 2px; }
  .funnel-layer-right { text-align: right; font-size: 0.85rem; color: #94a3b8; max-width: 260px; line-height: 1.4; }
  .funnel-layer-effect { display: inline-block; font-size: 0.8rem; font-weight: 600; padding: 2px 10px; border-radius: 4px; margin-top: 4px; }
  .fl-cache .funnel-layer-num { background: #10b98130; color: #10b981; }
  .fl-cache .funnel-layer-body { border-color: #10b981; background: #10b98108; }
  .fl-cache .funnel-layer-effect { background: #10b98120; color: #10b981; }
  .fl-lock .funnel-layer-num { background: #8b5cf630; color: #a78bfa; }
  .fl-lock .funnel-layer-body { border-color: #8b5cf6; background: #8b5cf608; }
  .fl-lock .funnel-layer-effect { background: #8b5cf620; color: #a78bfa; }
  .fl-quota .funnel-layer-num { background: #f9731630; color: #f97316; }
  .fl-quota .funnel-layer-body { border-color: #f97316; background: #f9731608; }
  .fl-quota .funnel-layer-effect { background: #f9731620; color: #f97316; }
  .fl-batch .funnel-layer-num { background: #f59e0b30; color: #f59e0b; }
  .fl-batch .funnel-layer-body { border-color: #f59e0b; background: #f59e0b08; }
  .fl-batch .funnel-layer-effect { background: #f59e0b20; color: #f59e0b; }
  .mechanisms-result { text-align: center; padding: 16px; background: #10b98115; border: 1px solid #10b981; border-radius: 10px; }
  .result-label { color: #94a3b8; font-size: 1rem; }
  .result-number { font-size: 2rem; font-weight: 800; color: #10b981; margin: 0 6px; }
  .result-unit { color: #10b981; font-size: 1.1rem; font-weight: 600; }
  .result-context { display: block; color: #64748b; font-size: 0.9rem; margin-top: 6px; }
  @media (max-width: 640px) {
    .funnel-layer-body { flex-direction: column; align-items: flex-start; gap: 6px; }
    .funnel-layer-right { text-align: left; max-width: none; }
  }

  /* Flow diagram */
  .flow { display: flex; flex-direction: column; gap: 0; align-items: center; margin: 24px 0; }
  .flow-step { background: #1e293b; border-radius: 8px; padding: 14px 24px; text-align: center; font-size: 1rem; min-width: 400px; position: relative; }
  .flow-step.controller { border: 2px solid #38bdf8; color: #38bdf8; }
  .flow-step.service { border: 2px solid #f59e0b; color: #f59e0b; }
  .flow-step.cache { border: 2px solid #10b981; color: #10b981; }
  .flow-step.lock { border: 2px solid #8b5cf6; color: #8b5cf6; }
  .flow-step.quota { border: 2px solid #f97316; color: #f97316; }
  .flow-step.api { border: 2px solid #ef4444; color: #ef4444; }
  .flow-step .detail { color: #94a3b8; font-size: 0.9rem; margin-top: 6px; }
  .flow-arrow { color: #475569; font-size: 1.3rem; padding: 5px 0; }

  /* Before/After */
  .comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin: 14px 0; }
  .comparison .side { background: #1e293b; border-radius: 8px; padding: 20px; min-width: 0; overflow-x: auto; }
  .comparison .side pre { word-break: break-word; white-space: pre-wrap; }
  .comparison .side h4 { margin-bottom: 10px; font-size: 1.1rem; }
  .comparison .before h4 { color: #ef4444; }
  .comparison .after h4 { color: #10b981; }
  @media (max-width: 640px) { .comparison { grid-template-columns: 1fr; } }

  /* Timing chain */
  .timing { display: flex; align-items: center; justify-content: center; gap: 0; margin: 24px 0; flex-wrap: wrap; }
  .timing-box { padding: 14px 22px; border-radius: 7px; text-align: center; font-size: 1.05rem; font-weight: 600; }
  .timing-box .label { font-size: 0.8rem; color: #94a3b8; display: block; margin-top: 4px; font-weight: 400; }
  .timing-box.t1 { background: #0ea5e920; color: #38bdf8; border: 1px solid #0ea5e9; }
  .timing-box.t2 { background: #f59e0b20; color: #f59e0b; border: 1px solid #f59e0b; }
  .timing-box.t3 { background: #8b5cf620; color: #a78bfa; border: 1px solid #8b5cf6; }
  .timing-arrow { color: #475569; padding: 0 12px; font-size: 1rem; }

  /* Decision accordion */
  .decision { background: #1e293b; border-radius: 10px; margin-bottom: 14px; border: 1px solid #334155; overflow: hidden; transition: border-color 0.3s; }
  .decision.open { border-color: #38bdf8; }
  .decision-header { display: flex; align-items: center; padding: 16px 20px; cursor: pointer; user-select: none; gap: 14px; transition: background 0.2s; }
  .decision-header:hover { background: #334155; }
  .decision-num { width: 32px; height: 32px; border-radius: 50%; background: #38bdf820; color: #38bdf8; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.95rem; flex-shrink: 0; }
  .decision-title { flex: 1; font-size: 1.05rem; font-weight: 600; color: #e2e8f0; }
  .decision-choice { font-size: 0.85rem; color: #10b981; background: #10b98115; padding: 3px 12px; border-radius: 4px; flex-shrink: 0; }
  .decision-arrow { color: #475569; font-size: 0.9rem; transition: transform 0.3s; flex-shrink: 0; }
  .decision.open .decision-arrow { transform: rotate(90deg); }
  .decision-body { display: none; padding: 0 20px 20px; }
  .decision.open .decision-body { display: block; }
  .decision-body p { font-size: 0.95rem; }
  .decision-body table { font-size: 0.9rem; }
  .decision-body pre { font-size: 0.88rem; }

  /* Finding cards */
  .finding { background: #1e293b; border-radius: 8px; padding: 18px 22px; margin-bottom: 14px; border-left: 3px solid #334155; }
  .finding-title { font-size: 1rem; font-weight: 600; color: #e2e8f0; margin-bottom: 8px; }
  .finding-row { display: flex; gap: 8px; margin-bottom: 6px; font-size: 0.92rem; }
  .finding-label { font-weight: 600; color: #94a3b8; min-width: 80px; flex-shrink: 0; }
  .finding-value { color: #cbd5e1; }
  .finding.warn { border-left-color: #f59e0b; }
  .finding.danger { border-left-color: #ef4444; }
  .finding.info { border-left-color: #38bdf8; }
  .finding.ok { border-left-color: #10b981; }

  /* Cmd block */
  .cmd { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 16px 20px; margin: 14px 0; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.9rem; line-height: 1.8; }
  .cmd .prompt { color: #10b981; user-select: none; }
  .cmd .comment { color: #475569; }
  .cmd-line { position: relative; display: flex; align-items: baseline; gap: 0; margin: 4px 0; }
  .cmd-line .prompt { color: #10b981; user-select: none; }
  .cmd-line code { flex: 1; color: #e2e8f0; background: none; padding: 0; font-size: inherit; }
  .cmd-line .copy-btn { position: absolute; right: 0; top: 0; background: #334155; color: #94a3b8; border: 1px solid #475569; border-radius: 4px; padding: 2px 8px; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .cmd-line .copy-btn:hover { background: #475569; color: #e2e8f0; }
  .cmd-line .copy-btn.copied { background: #10b981; color: #0f172a; border-color: #10b981; opacity: 1; }

  /* Env table */
  .env-table { margin: 14px 0; }
  .env-row { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid #1e293b; font-size: 0.95rem; }
  .env-var { font-family: monospace; color: #38bdf8; min-width: 180px; flex-shrink: 0; }
  .env-desc { color: #94a3b8; }

  /* Test grid */
  .test-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; margin: 14px 0; }
  .test-card { background: #1e293b; border-radius: 8px; padding: 16px 18px; border: 1px solid #334155; }
  .test-card-name { font-size: 1rem; font-weight: 600; color: #e2e8f0; margin-bottom: 6px; font-family: monospace; }
  .test-card-desc { font-size: 0.88rem; color: #94a3b8; line-height: 1.5; }
  .test-card-tool { font-size: 0.78rem; color: #64748b; margin-top: 8px; }

  /* Non-goals */
  .nongoal { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid #1e293b; }
  .nongoal-icon { flex-shrink: 0; font-size: 1.1rem; margin-top: 2px; }
  .nongoal-text { font-size: 0.95rem; color: #cbd5e1; }
  .nongoal-text strong { color: #e2e8f0; }
  .nongoal-reason { font-size: 0.85rem; color: #64748b; margin-top: 4px; }
  .nongoal.done .nongoal-icon { color: #10b981; }
  .nongoal.skip .nongoal-icon { color: #64748b; }

  /* Report link button */
  .report-link { display:inline-block; padding:8px 18px; background:#1e293b; border:1px solid #334155; border-radius:6px; color:#38bdf8; font-size:0.9rem; text-decoration:none; transition: background 0.15s, border-color 0.15s, box-shadow 0.15s; animation: nav-idle-pulse 2s ease-in-out infinite; }
  .report-link:hover { background:#1e3a5f; border-color:#38bdf8; box-shadow:0 0 10px #38bdf830; text-decoration:none; }

  /* File tree */
  .tree { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 18px 22px; margin: 14px 0; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.85rem; line-height: 1.7; overflow-x: auto; }
  .tree .new { color: #10b981; }
  .tree .modified { color: #f59e0b; }

<!-- ==================== Challenge ==================== -->
<section id="challenge">
<h2>問題背景</h2>

<div style="background:linear-gradient(135deg, #78350f50, #43140730); border:1px solid #f59e0b55; padding:20px 24px; border-radius:10px; margin:0 0 18px 0; color:#cbd5e1; font-style:italic;">
  「我們的 Data 與 AI 團隊建立了一個強大的模型來處理這項需求，但推論過程<b style="color:#ef4444;">計算成本極高</b>。為了讓產品更具成本效益，我們分析了模型的輸出，發現計算出的房價在 5 分鐘內持續有效。」
  <div style="font-style:normal; font-size:0.82rem; color:#64748b; margin-top:6px;">— 旅宿定價場景</div>
</div>

<div class="card blue">
  <h4>這個限制代表什麼</h4>
  <p>每次打 upstream 都會消耗<b style="color:#ef4444;">昂貴的推論算力</b>。因此我把目標設得更嚴：不只是「維持在 1,000/天以下」，而是<span class="highlight">將真實呼叫次數降到最低</span>。系統必須用 1,000/天的預算服務<b>每日 1,000,000+ 筆請求</b>。</p>
</div>

<div class="card yellow">
  <h4>為什麼光靠 cache 不夠</h4>
  <p>36 種參數組合（4 個時段 × 3 家飯店 × 3 種房型）× 每天 288 個 5 分鐘窗口：</p>
  <div class="math">36 &times; 288 = 10,368 possible cache misses/day</div>
  <p>遠超過 1,000 次的預算上限。我們需要 <b>batch fetching</b> + <b>request coalescing</b> + <b>硬性配額上限</b>。</p>
</div>
</section>

<h2>解決方案 — 4 層防護機制</h2>

<div style="background:linear-gradient(135deg, #064e3b50, #052e1630); border:1px solid #10b98155; padding:20px 24px; border-radius:10px; margin-bottom:18px;">
  <div style="font-size:1.15rem; color:#10b981; font-weight:700; letter-spacing:0.3px; margin-bottom:8px;">
    Lazy fallback + Bulk fetch &nbsp;&rarr;&nbsp; <span style="font-size:1.4rem;">0 ~ 288 calls / day</span>
  </div>
  <div style="color:#cbd5e1; line-height:1.55; font-size:0.97rem;">
    <b>288</b> = 上限的數學下限（24 小時 &div; 5 分鐘 TTL，每次 bulk fetch 一口氣回傳全部 36 個房價）。<b style="color:#10b981;">0</b> = lazy 的下限（沒人查詢時完全不打 upstream）。&nbsp;
    <b style="color:#10b981;">為什麼不用 prewarming？</b>規範把推論定義為<b style="color:#ef4444;">計算成本極高</b>，所以花費應該跟著真實需求走 &mdash; prewarming 即使零流量也固定燒掉 288 次/天。
  </div>

    <b style="color:#10b981;">硬性上限：</b>1,000 次/天由 <b>QuotaGuard</b> 在本地強制執行 &mdash; 即使上層防護失效、或 upstream 自己的 rate limiter 設定錯誤，這條線仍然成立。

<!-- ==================== Architecture ==================== -->
<section id="architecture">
<h2>系統架構</h2>

<p style="color:#94a3b8; margin-bottom:18px;">完整架構：client → Rails app（4 層）→ Redis + upstream。每一層在下方各自的區塊中詳細說明。</p>

<img src="architecture.jpg" alt="System architecture diagram" style="width:100%; max-width:100%; height:auto; border-radius:10px; border:1px solid #334155; margin-bottom:20px;">

<div class="card blue" style="margin-top:18px;">
  <h4>部署說明 — <span style="color:#f59e0b;">單一 Redis 實例</span>假設</h4>
  <p>本實作假設<b style="color:#f59e0b;">單一 Redis 實例</b>。在 Sentinel / Cluster HA 架構下，<code>LockAndFetchRate</code> 的 SETNX 可能在 primary failover 期間遺失 &mdash; 出現短暫視窗，可能同時存在兩個 leader。</p>
  <p style="margin-top:8px;">在 production HA 環境，標準解法是用基於共識演算法的協調器，例如 <b>etcd</b>、<b>Consul</b> 或 <b>ZooKeeper</b>（底層是 Raft/Paxos）。<b>Redlock</b> 比單一 Redis 好，但在時鐘偏移或 GC 暫停下有已知的安全性問題，詳見 <a href="https://martin.kleppmann.com/2016/02/08/how-to-do-distributed-locking.html" target="_blank" style="color:#38bdf8;">Martin Kleppmann 的分散式鎖分析</a>。原子的 <code>QuotaGuard</code> 計數器是第二道防線 &mdash; 即使兩個 leader 短暫並存，每日 upstream 上限仍然成立。</p>
</div>
</section>

<!-- ==================== Layer 1: RateCache ==================== -->
<section id="cache">
<h2>第一層：Cache</h2>
<p style="color: #64748b; font-size: 0.88rem; margin-top: -8px;"><code>app/services/rate_cache.rb</code></p>

<div class="card green">
  <h4>背景</h4>
  <p>Upstream API 成本昂貴（每天 1,000 次上限）。相同的 <code>(period, hotel, room)</code> 組合在一段時間內會回傳相同的房價。</p>
</div>
<div class="card red">
  <h4>問題</h4>
  <p>沒有 cache，每個請求都要打 upstream。每天 1,000,000 筆請求，配額會很快燒光。</p>
</div>
<div class="card blue">
  <h4>解決方案</h4>
  <p>以 <code>(period, hotel, room)</code> 為 key，設定 <span class="highlight">5 分鐘 TTL</span> 存入 cache。在此時間窗口內，相同組合的請求全部從 cache 回傳 — 不打任何 upstream。</p>
  <pre>cache key: <span class="string">"pricing:Summer:FloatingPointResort:SingletonRoom"</span>
TTL: <span class="number">5 minutes</span>
Total keys: <span class="number">36</span> (4 periods &times; 3 hotels &times; 3 rooms)</pre>
</div>
</section>

<!-- ==================== Layer 2: LockAndFetchRate ==================== -->
<section id="lock">
<h2>第二層：Thundering Herd 防護</h2>
<p style="color: #64748b; font-size: 0.88rem; margin-top: -8px;"><code>app/services/lock_and_fetch_rate.rb</code></p>

<div class="card green">
  <h4>背景</h4>
  <p>Cache 每 5 分鐘過期一次。過期瞬間，可能有大量請求同時進來，全部遇到 cache miss。</p>
</div>
<div class="card red">
  <h4>問題</h4>
  <p>沒有協調機制，每個 concurrent cache miss 請求都會各自打 upstream。50 個並發請求會消耗 50 個配額單位，而不是 1 個。</p>
</div>
<div class="card blue">
  <h4>解決方案</h4>
  <p>使用 Redis lock（<code>SET NX</code>）搭配<b>全域</b> lock key（<code>lock_and_fetch_rate:pricing:bulk_fetch</code>）選出一個「leader」。Leader 打 upstream 並填滿全部 36 個 cache 項目；其餘「followers」等待並從剛更新的 cache 讀取。</p>
  <div class="math">50 simultaneous requests = 1 upstream call = 1 quota unit = 36 cached rates</div>
</div>

<h3 id="timing-chain">計時鏈設計</h3>
<p>三個值形成一條計時鏈 — 每個值都依賴前一個：</p>

<div class="timing">
  <div class="timing-box t1">5s<span class="label">UPSTREAM_TIMEOUT</span></div>
  <div class="timing-arrow">&rarr; +1s &rarr;</div>
  <div class="timing-box t2">6s<span class="label">FOLLOWER_TIMEOUT</span></div>
  <div class="timing-arrow">&rarr; +1s &rarr;</div>
  <div class="timing-box t3">7s<span class="label">LOCK_AUTO_EXPIRE</span></div>
</div>

<div class="card blue">
  <h4>UPSTREAM_TIMEOUT（5s）— 定義於 RateApiClient</h4>
  <p>沒有 timeout，upstream 如果卡住，請求會永遠阻塞並佔用 Puma worker。5 秒讓 upstream 有足夠時間正常回應，但在 upstream 掛掉時能快速釋放 worker。</p>
</div>
<div class="card yellow">
  <h4>FOLLOWER_TIMEOUT（6s）— 為什麼不是剛好 5s？</h4>
  <p>Leader 可能在 4.9s 收到 upstream 回應並寫入 cache，但 follower 在 5.0s 就放棄了 — 白等一場。多 1 秒的緩衝處理這個邊界情況。</p>
</div>
<div class="card purple">
  <h4>LOCK_AUTO_EXPIRE（7s）— 安全網</h4>
  <p>正常情況下，<code>ensure</code> 會在 leader 完成後立即刪除 lock。但若程序強制崩潰（如 <code>kill -9</code>），<code>ensure</code> 不會執行，lock 就卡住了。7 秒自動過期是最後的安全網。</p>
  <p>必須比 FOLLOWER_TIMEOUT（6s）更長。若更短，lock 在 followers 還在等待時就過期 → 新請求搶到 lock → 成為第二個 leader → 再次打 upstream → 浪費配額。</p>
</div>
<div class="card green">
  <h4>FOLLOWER_POLL_INTERVAL（50ms）</h4>
  <p>1ms 太快，會大量打 Redis。1s 太慢，leader 完成後 follower 最多還要等 1 秒。50ms 是好的平衡點，最多增加 50ms 的額外延遲。</p>
</div>

<div style="text-align:center;"><a href="lock_and_fetch_rate_demo.html" class="demo-link">開啟互動式 Demo &rarr;</a></div>
</section>

<!-- ==================== Layer 3: QuotaGuard ==================== -->
<section id="quota">
<h2>第三層：Quota Guard</h2>
<p style="color: #64748b; font-size: 0.88rem; margin-top: -8px;"><code>app/services/quota_guard.rb</code></p>

<div class="card green">
  <h4>背景 — 快速失敗的保險絲</h4>
  <p>搭配 Batch Fetch，理論最大值只有 288 次/天 — 遠低於 1,000 的預算。正常運作下，QuotaGuard <b>永遠不會觸發</b>。它是一個<b>本地保險絲</b>，用來防範不該發生但可能發生的情況 — 例如讓每次 cache miss 都變成 upstream 呼叫的 bug：</p>
  <ul style="margin: 8px 0 12px 20px; font-size: 0.95rem; line-height: 1.8;">
    <li><b>Upstream 改變回應格式</b> &mdash; 例如 upstream 把 <code>rate</code> 改名成 <code>price</code>。解析失敗、cache 一直空著，每個請求都打 upstream，直到 upstream 自己開始拒絕。</li>
    <li><b>Cache 寫入有 bug</b> &mdash; 例如 <code>RateCache.write_all</code> 的 key 名稱打錯字。寫入悄悄成功但讀取永遠對不上 &rarr; 同樣的失控迴圈。</li>
  </ul>
  <p>正常情況下第 1,001 次呼叫會在前端就被 429 擋掉 &mdash; upstream 根本不會為它跑那段昂貴的推論。但萬一這個限制器設定出錯（bug、重新部署、staging 的怪狀況），溢出的請求就會真的打到<b style="color:#ef4444;">計算成本極高</b>的推論、燒掉真實算力。<b>QuotaGuard 讓我們<span style="color:#f59e0b;">不論 upstream 的強制狀態如何</span>都守住 1,000 次/天的合約。</b></p>
  <div style="background:#1e293b40; border-left:3px solid #f59e0b; padding:10px 14px; border-radius:0 6px 6px 0; margin-top:8px;">
    <p style="margin:0 0 6px;"><b style="color:#f59e0b;">接受的 trade-off：</b></p>
    <ul style="margin:0 0 0 18px; font-size:0.95rem;">
      <li><b>重複狀態</b> &mdash; 上限在兩個地方被強制執行（upstream 和這裡）。如果 upstream 放寬到 2,000，<code>DAILY_LIMIT</code> 也得跟著改。</li>
      <li><b>增加複雜度</b> &mdash; 約 50 行程式碼 + 測試 + 一個 Redis 依賴，只為了一個正常運作下永遠不該觸發的層。極簡做法會跳過 QuotaGuard、信任 upstream 自己的 429，接受那一點點延遲 / 可觀測性的代價。</li>
    </ul>
  </div>
</div>
<div class="card red">
  <h4>問題</h4>
  <p>多個 Puma worker 同時處理請求。簡單的「讀取 → 檢查 → 遞增」存在競態條件：兩個 worker 可能同時讀到 999，同時通過檢查，然後各自打 upstream。</p>
  <pre><span class="comment">// Race condition example:</span>
Worker A: read count &rarr; <span class="number">999</span> &rarr; passes check &rarr; calls upstream   <span class="comment">// count is now 1000</span>
Worker B: read count &rarr; <span class="number">999</span> &rarr; passes check &rarr; calls upstream   <span class="comment">// EXCEEDED!</span></pre>
</div>
<div class="card blue">
  <h4>解決方案</h4>
  <p>Redis <code>INCR</code> 是原子操作 — 在單一步驟內遞增並回傳新值。每個請求取得唯一的序號，恰好 1,000 次呼叫通過，沒有競態條件。</p>
  <pre>daily key: <span class="string">"quota:2026-04-22"</span>    <span class="comment">// auto-expires at midnight</span>
Redis INCR &rarr; <span class="number">1000</span> &rarr; pass &#10003;
Redis INCR &rarr; <span class="number">1001</span> &rarr; raise ExhaustedError &#10007;</pre>
</div>

<div class="card yellow">
  <h4>為什麼是 1,000 而不是 900？</h4>
  <p>INCR 是原子操作，不可能超出。降低緩衝只在有逐漸減速策略時有意義。我們用硬性停止加上 <code>Retry-After</code> 到午夜，所以設更低的上限只是浪費配額。</p>
</div>

<div class="card red">
  <h4>假設：配額在 UTC 午夜重置</h4>
  <p>Upstream rate API 文件沒有說明每日配額何時重置。本實作假設<b>UTC 午夜</b> — Redis key 使用 <code>quota:YYYY-MM-DD</code>（UTC），<code>Retry-After</code> header 計算到 UTC 00:00 的秒數。若實際重置時間不同，只需修改 key 的日期邏輯與 Retry-After 計算。</p>
</div>
</section>

<!-- ==================== Layer 4: Batch Fetch ==================== -->
<section id="batch">
<h2>第四層：Batch Fetch</h2>
<p style="color: #64748b; font-size: 0.88rem; margin-top: -8px;"><code>lib/rate_api_client.rb</code> &rarr; <code>get_all_rates</code></p>

<div class="card green">
  <h4>背景</h4>
  <p>Upstream API 支援在單一請求中查詢多個房價。總共有 36 種組合（4 個時段 × 3 家飯店 × 3 種房型）。</p>
</div>
<div class="card red">
  <h4>問題</h4>
  <p>沒有 batch，每次 cache miss 只取一個房價 — 每個房價消耗一個配額單位。即使有 LockAndFetchRate，最糟情況仍是 36 次 cache miss × 288 個窗口 = 10,368 次/天。</p>
</div>
<div class="card blue">
  <h4>解決方案</h4>
  <p>任何 cache miss 發生時，透過 <code>RateApiClient.get_all_rates</code> 以<b>單一 API 呼叫取得全部 36 個房價</b>，再由 <code>RateCache.write_all</code> 一次填滿所有 cache key。一個配額單位讓整個 cache 在接下來 5 分鐘內保持有效。</p>
  <div class="math">1 API call &rarr; 36 cache entries &rarr; 5 minutes of full coverage</div>
</div>

<div class="comparison">
  <div class="side before">
    <h4>未使用 Batch</h4>
    <pre>Cache miss for <span class="string">"Summer:FloatingPointResort:SingletonRoom"</span>
  &rarr; fetch <span class="number">1</span> rate
  &rarr; write <span class="number">1</span> cache entry
  &rarr; <span class="number">1</span> quota unit for <span class="number">1</span> rate</pre>
    <p style="font-size:0.95rem;">最糟情況：<span style="color:#ef4444; font-weight:600;">10,368 次/天</span></p>
  </div>
  <div class="side after">
    <h4>使用 Batch</h4>
    <pre>Cache miss for <span class="string">"Summer:FloatingPointResort:SingletonRoom"</span>
  &rarr; fetch <span class="number">36</span> rates (all combos)
  &rarr; write <span class="number">36</span> cache entries
  &rarr; <span class="number">1</span> quota unit for <span class="number">36</span> rates</pre>
    <p style="font-size:0.95rem;">最糟情況：<span style="color:#10b981; font-weight:600;">288 次/天</span>（= 理論最小值）</p>
  </div>
</div>
</section>

<!-- ==================== Request Flow ==================== -->
<section id="flow">
<h2>請求流程</h2>

<div class="flow">
  <div class="flow-step controller">
    <b>PricingController</b>
    <div class="detail">驗證參數 → 無效時回傳 400；將 service 錯誤轉換為對應狀態碼（429、502、504）</div>
  </div>
  <div class="flow-arrow">&#9660;</div>
  <div class="flow-step service">
    <b>PricingService</b>
    <div class="detail">協調完整流程，將錯誤對應至 HTTP 狀態碼</div>
  </div>
  <div class="flow-arrow">&#9660;</div>
  <div class="flow-step cache">
    <b>&oplus; RateCache.read</b>
    <div class="detail">Cache 命中？→ 立即回傳，略過以下所有步驟</div>
  </div>
  <div class="flow-arrow">&#9660; cache miss 時繼續</div>
  <div class="flow-step lock">
    <b>&oplus; LockAndFetchRate.call</b>
    <div class="detail">取得 Redis lock → 只有一個請求繼續（leader），其餘等待（followers）</div>
  </div>
  <div class="flow-arrow">&#9660; 僅 leader 繼續</div>
  <div class="flow-step quota">
    <b>&oplus; QuotaGuard.consume_quota!</b>
    <div class="detail">原子 Redis INCR — 若計數超過 1,000，拋出 ExhaustedError</div>
  </div>
  <div class="flow-arrow">&#9660;</div>
  <div class="flow-step api">
    <b>&oplus; RateApiClient.get_all_rates</b>
    <div class="detail">單一請求 POST 全部 36 種組合 → 1 次 API 呼叫 = 1 個配額單位</div>
  </div>
  <div class="flow-arrow">&#9660;</div>
  <div class="flow-step cache">
    <b>&oplus; RateCache.write_all (36 rates)</b>
    <div class="detail">一次填滿整個 cache → 全部 36 個 key 取得 5 分鐘 TTL</div>
  </div>
</div>

</section>

<!-- ==================== Design Decisions ==================== -->
<section id="decisions">
<h2>設計決策</h2>
<p>每項決策列出考量的選項、最終選擇，以及有意識地接受的 trade-off。點擊展開。</p>

<div class="decision open" data-id="d1">
  <div class="decision-header" onclick="toggleDecision(this)">
    <div class="decision-num">1</div>
    <div class="decision-title">何時打 upstream <span style="color:#64748b; font-size:0.85rem; font-weight:400;">（Lazy vs Prewarming）</span></div>
    <div class="decision-choice">Lazy on-demand</div>
    <div class="decision-arrow">&#9656;</div>
  </div>
  <div class="decision-body">
    <p>Batch fetch 本身不是選擇題 &mdash; 數學就是這樣強迫的：36 種組合 &times; 每天 288 個 cache 窗口 = <b>10,368 次呼叫</b>，遠超 1,000 的預算。所以<i>每次</i> upstream 呼叫必須一次回傳全部 36 個房價。在 5 分鐘 TTL 下，<b>288/天是上限的數學下限</b> &mdash; 沒有任何符合規範的設計在尖峰時能做得更少。真正值得思考的是<b>何時</b>觸發這個呼叫：第一次 cache miss 時（lazy &mdash; <b style="color:#10b981;">下限為 0</b>），還是按排程（prewarming &mdash; 固定 &ge; 288）。</p>
    <table>
      <thead><tr><th>選項</th><th>行為</th></tr></thead>
      <tbody>
        <tr>
          <td>定期 prewarming<br><span style="font-size:0.82rem; color:#94a3b8;">例如 Sidekiq cron 每 4 分鐘執行</span></td>
          <td>Cache 始終保持熱，每個請求都即時回應。<b>但：</b>即使零流量也消耗 <b>360 次/天</b>；需要額外基礎設施（Sidekiq + scheduler）。</td>
        </tr>
        <tr>
          <td><b>Lazy on-demand</b> &#10003;</td>
          <td><b style="color:#f59e0b;">Upstream 成本與實際需求成比例</b> &mdash; 沒人查詢時 0 次，滿載時最多 288/天。不需要額外基礎設施。</td>
        </tr>
      </tbody>
    </table>
    <p><b>為什麼 lazy 適合這個工作負載：</b></p>
    <ul style="margin:6px 0 8px 20px;">
      <li>上游被定義為<b style="color:#ef4444;">計算成本極高</b> &mdash; 只在有真實需求時才消耗配額</li>
      <li>旅宿流量不均勻（旺季、尖峰時段、離峰時段）；lazy 自然適應</li>
      <li>1,000/天的緊張預算獎勵按比例使用；prewarming 固定消耗 360/天，若流量尖峰打破 cache 數學就沒有餘裕</li>
    </ul>
    <p style="background:#1e293b40; border-left:3px solid #f59e0b; padding:10px 14px; border-radius:0 6px 6px 0; margin-top:8px;"><b style="color:#f59e0b;">Prewarming 是正確選擇的情況：</b>流量可預測且穩定、延遲 SLA 嚴格（任何 cache miss 都不可接受），或配額預算充裕。在那些工作負載下，prewarming 勝出。不同限制條件，不同答案。</p>
    <p><b>接受的 trade-off：</b>第一個遇到過期 cache 的使用者要承擔小額的延遲成本（等待 upstream 呼叫）。之後在同一個 5 分鐘窗口內的所有請求都是即時 cache 命中。</p>
  </div>
</div>

<div class="decision" data-id="d2">
  <div class="decision-header" onclick="toggleDecision(this)">
    <div class="decision-num">2</div>
    <div class="decision-title">共享 cache backend <span style="color:#64748b; font-size:0.85rem; font-weight:400;">（L1–L3）</span></div>
    <div class="decision-choice">Redis</div>
    <div class="decision-arrow">&#9656;</div>
  </div>
  <div class="decision-body">
    <table>
      <thead><tr><th>選項</th><th>被排除的原因</th></tr></thead>
      <tbody>
        <tr><td><code>MemoryStore</code></td><td>每個 Puma worker 各自的記憶體 — 命中率除以 worker 數量，無法滿足 10:1 的需求。</td></tr>
        <tr><td><code>SolidCache</code></td><td>基於 SQLite；沒有原子 <code>INCR</code> 可用於配額；row-level lock 爭用。</td></tr>
        <tr><td><b>Redis</b> &#10003;</td><td>跨 worker 共享；原子操作（<code>SET NX</code>、<code>INCR</code>、<code>EXPIREAT</code>）用一個依賴項解決 cache、lock 和配額三個問題。</td></tr>
      </tbody>
    </table>
    <p><b>Trade-off：</b><code>docker-compose.yml</code> 多一個服務。值得 — Redis 在 Rails production 環境中極為普遍。</p>
  </div>
</div>

<div class="decision" data-id="d3">
  <div class="decision-header" onclick="toggleDecision(this)">
    <div class="decision-num">3</div>
    <div class="decision-title">Thundering herd 防護 <span style="color:#64748b; font-size:0.85rem; font-weight:400;">（L2 Lock）</span></div>
    <div class="decision-choice">Redis SET NX lock</div>
    <div class="decision-arrow">&#9656;</div>
  </div>
  <div class="decision-body">
    <p>沒有合併機制，50 個請求的爆發會在毫秒內燒掉 50 個每日配額單位。Redis <code>SET NX</code> 在所有 Puma worker 中選出一個 leader；其餘 followers 輪詢 cache。</p>

    <pre><span class="comment">// LockAndFetchRate pseudocode:</span>
token = SecureRandom.uuid                              <span class="comment">// per-leader fencing token</span>
<span class="keyword">if</span> SET NX <span class="string">"lock:bulk_fetch"</span> = token (TTL 7s) &rarr; leader
   yield                                              <span class="comment">// fetch upstream, write cache</span>
   Lua: <span class="keyword">if</span> GET == token <span class="keyword">then</span> DEL          <span class="comment">// release only if still ours</span>
<span class="keyword">else</span> &rarr; follower: poll cache every 50ms up to 6s</pre>

    <p><b style="color:#f59e0b;">Fencing token：</b>每個 leader 持有一個唯一的 UUID。釋放時，Lua script 先確認「還是我的？」才刪除 &mdash; 否則一個緩慢的 leader 可能誤刪新 leader 的 lock，讓第三個請求趁虛而入。</p>

    <p style="background:#1e293b40; border-left:3px solid #f59e0b; padding:10px 14px; border-radius:0 6px 6px 0; margin-top:8px;"><b style="color:#f59e0b;">單一 Redis 假設：</b>在 Sentinel / Cluster HA 下，primary failover 可能短暫產生兩個 leader。Production HA 環境需要基於 Raft 的協調器（etcd / Consul）。QuotaGuard 的原子計數器是第二道防線 &mdash; 即使兩個 leader 短暫並存，每日上限仍然成立。</p>
  </div>
</div>

<div class="decision" data-id="d4">
  <div class="decision-header" onclick="toggleDecision(this)">
    <div class="decision-num">4</div>
    <div class="decision-title">配額防護 <span style="color:#64748b; font-size:0.85rem; font-weight:400;">（L3 Quota）</span></div>
    <div class="decision-choice">Redis atomic counter</div>
    <div class="decision-arrow">&#9656;</div>
  </div>
  <div class="decision-body">
    <p>Upstream 的限制是每天 1,000 次 &mdash; 不是每秒。所以我們需要一個在午夜重置的簡單計數器。</p>

    <h5 style="color:#94a3b8; text-transform:uppercase; font-size:0.78rem; letter-spacing:0.08em; margin:18px 0 6px;">為什麼需要這一層</h5>
    <p>Batch Fetch 已將理論最大值壓在 <b>288 次/天</b> &mdash; 遠低於預算。正常運作下，QuotaGuard 永遠不會觸發。</p>
    <p>真正的殘餘價值是<b style="color:#f59e0b;">防禦性的客戶端行為</b>：即使 upstream 自身的 rate limiter 因 bug、重新部署或 staging 問題而失效，我們仍將自己的呼叫速率限制在 1,000/天。在那種邊界情況下，溢出的請求會打到 upstream 那台<b style="color:#ef4444;">計算成本極高</b>的推論引擎並燒掉真實算力。QuotaGuard 防止了這件事。</p>
    <div style="background:#1e293b40; border-left:3px solid #f59e0b; padding:10px 14px; border-radius:0 6px 6px 0; margin-top:8px;">
      <p style="margin:0 0 6px;"><b style="color:#f59e0b;">接受的 trade-off：</b></p>
      <ul style="margin:0 0 0 18px; font-size:0.95rem;">
        <li><b>重複狀態</b> &mdash; 上限在兩個地方都被強制執行（upstream 和這裡）。如果 upstream 放寬到 2,000，<code>DAILY_LIMIT</code> 也需要更新。</li>
        <li><b>增加複雜度</b> &mdash; ~50 行程式碼 + 測試 + Redis 依賴，用於一個在正常運作下永遠不應觸發的層。極簡做法是跳過 QuotaGuard，信任 upstream 自己的 429，接受小額的延遲 / 可觀測性成本。</li>
      </ul>
    </div>

    <h5 style="color:#94a3b8; text-transform:uppercase; font-size:0.78rem; letter-spacing:0.08em; margin:18px 0 6px;">為什麼選 Redis</h5>
    <p>計數器必須在所有 Puma worker（獨立 process）間共享，而 <code>INCR</code> 是原子操作 &mdash; 它在單一步驟內遞增並回傳新值，所以兩個 worker 不可能同時讀到 999 並同時通過檢查。</p>

    <h5 style="color:#94a3b8; text-transform:uppercase; font-size:0.78rem; letter-spacing:0.08em; margin:18px 0 6px;">實作細節</h5>
    <ul style="margin:6px 0 8px 20px;">
      <li>對 <code>quota:YYYY-MM-DD</code> 執行 <code>INCR</code> &mdash; 原子操作，跨 worker</li>
      <li>只在 lock 內的 cache miss 時執行 &mdash; cache 命中的回應不觸碰計數器</li>
      <li>上限精確設為 1,000（不更低），因為 <code>INCR</code> 是原子操作 &mdash; 不可能超出</li>
    </ul>

    <h5 style="color:#94a3b8; text-transform:uppercase; font-size:0.78rem; letter-spacing:0.08em; margin:18px 0 6px;">強化設計</h5>
    <ul style="margin:6px 0 8px 20px;">
      <li><b>計數器在重啟後存活</b> &mdash; Redis AOF 持久化 + persistent volume。沒有這個，Redis 重啟會清空計數器，跨重啟的上限可能被超出。</li>
      <li><b>退款不會變負數</b> &mdash; <code>refund_quota!</code> 將 DECR 包在 Lua script 中，只在計數器大於零時執行。沒有這個，在任何 INCR 之前爆發的 401 會把計數器推成負數，讓後續的 INCR 悄悄超出 1,000。</li>
    </ul>

    <h5 style="color:#94a3b8; text-transform:uppercase; font-size:0.78rem; letter-spacing:0.08em; margin:18px 0 6px;">假設</h5>
    <p>配額在 <span class="highlight">UTC 午夜</span>重置。Upstream 文件沒有說明每日限制何時重置，所以我們假設 UTC 00:00。Redis key 使用 <code>quota:YYYY-MM-DD</code>（UTC），<code>Retry-After</code> 計算到 UTC 午夜的秒數。如果實際重置時間不同，只需更新這兩個值。</p>
  </div>
</div>

<div class="decision" data-id="d5">
  <div class="decision-header" onclick="toggleDecision(this)">
    <div class="decision-num">5</div>
    <div class="decision-title">故障策略</div>
    <div class="decision-choice">Fail-closed</div>
    <div class="decision-arrow">&#9656;</div>
  </div>
  <div class="decision-body">
    <p>當依賴項目掛掉（Redis、upstream、lock），服務應該怎麼辦？有四種常見策略 — 每種優先順序不同。</p>

    <table style="margin: 14px 0;">
      <thead>
        <tr><th>策略</th><th>行為</th><th>保護</th><th>犧牲</th></tr>
      </thead>
      <tbody>
        <tr style="background:#10b98115;">
          <td><b style="color:#10b981;">✓ Fail-closed</b><br><span style="font-size:0.82rem; color:#94a3b8;">我的選擇</span></td>
          <td>依賴掛掉 → 回傳 5xx，永不打 upstream</td>
          <td>Upstream 合約（1,000/天上限）</td>
          <td>自身服務可用性</td>
        </tr>
        <tr>
          <td>Fail-open</td>
          <td>依賴掛掉 → 繞過保護，直接打 upstream</td>
          <td>自身可用性</td>
          <td>配額快速耗盡；thundering herd 無法阻擋</td>
        </tr>
        <tr>
          <td>Graceful degradation</td>
          <td>回傳過期 cache、預設值或部分回應</td>
          <td>使用者體驗</td>
          <td>資料即時性 / 正確性</td>
        </tr>
        <tr>
          <td>Fail-fast + retry</td>
          <td>回傳 5xx，預期客戶端以 backoff 重試</td>
          <td>與 fail-closed 相同，但將重試責任推給呼叫方</td>
          <td>假設客戶端行為良好</td>
        </tr>
      </tbody>
    </table>

    <p><b>為什麼這個服務選 fail-closed：</b>兩條規範要求強迫了這個選擇。</p>
    <ol style="margin-left:20px;">
      <li><b>「房價資料不得超過 5 分鐘」</b> → 不能回傳過期資料 → 排除 graceful degradation。</li>
      <li><b>「每個 token 每天 1,000 次」（硬性合約）</b> → 不能讓失敗滲透到 upstream → 排除 fail-open。</li>
    </ol>
    <p>排除這兩個後，fail-closed 是唯一誠實的選擇。Fail-fast + retry 功能上等效，但將正確性責任轉嫁給客戶端；對 proxy 來說，自己承擔這個責任更乾淨。</p>

    <p><b>我會選擇不同策略的情況：</b></p>
    <ul style="margin-left:20px;">
      <li><b>推薦 API</b> — graceful degradation。回傳熱門內容比什麼都不回傳更好。</li>
      <li><b>按讚 / 瀏覽計數器</b> — fail-open。多幾次寫入無傷大雅。</li>
      <li><b>內部分析 dashboard</b> — 帶提示的 fail-open。操作人員能自行判斷過期資料。</li>
    </ul>
    <p>正確的選擇永遠取決於<b>「錯誤資料」還是「沒有資料」傷害更大</b>。對定價來說，錯誤資料的代價更高。</p>
  </div>
</div>

<div class="decision" data-id="d6">
  <div class="decision-header" onclick="toggleDecision(this)">

    <div class="decision-title">錯誤處理</div>

  </div>
  <div class="decision-body">

    <div class="comparison">
      <div class="side before">
        <h4>&#10007; Before</h4>
        <p style="font-size:0.92rem;">所有 upstream 失敗 — 401、5xx、timeout — 都回傳 <code>400 Bad Request</code>。客戶端無法區分請求本身有問題還是伺服器端失敗。</p>
      </div>
      <div class="side after">
        <h4>&#10003; After</h4>
        <p style="font-size:0.92rem;">每種失敗對應不同的 HTTP 狀態碼。客戶端清楚知道發生了什麼，以及該修正請求、重試還是升級處理。</p>
      </div>
    </div>

    <div class="finding info" style="margin-bottom:18px;">
      <div class="finding-title">為什麼重要 — upstream 失敗率極高</div>
      <div class="finding-row"><span class="finding-label">~7%</span><span class="finding-value">HTTP 500（upstream 回傳）</span></div>
      <div class="finding-row"><span class="finding-label">~7%</span><span class="finding-value">逾時</span></div>
      <div class="finding-row"><span class="finding-label">~7%</span><span class="finding-value">HTTP 200 但 body 是錯誤 <code style="font-size:0.82rem;">{"message":"Failed to process rates...","status":"error"}</code></span></div>
      <div class="finding-row"><span class="finding-label">~7%</span><span class="finding-value">HTTP 200 但回應缺少 <code>rate</code> 欄位</span></div>
      <p style="margin-top:10px; margin-bottom:0; font-size:0.88rem; color:#64748b;">來自 1,001 次真實測試呼叫 — 完整模式表格見 <code>UPSTREAM_BEHAVIOR.md</code>。</p>
    </div>

    <p><span style="display:inline-block; background:#38bdf820; color:#38bdf8; border:1px solid #38bdf8; border-radius:5px; padding:2px 12px; font-weight:700; font-size:0.95rem; letter-spacing:0.03em;">Anti-Corruption Layer (ACL)</span> &nbsp;<code>RateApiClient</code> 吸收所有 upstream 的不穩定行為，對外暴露乾淨的型別化介面。<code>PricingService</code> 永遠不會直接接觸原始 HTTP 回應：</p>

    <div class="flow" style="margin: 18px 0;">

      <!-- Chaos zone -->
      <div style="background:#ef444420; border:2px solid #ef4444; border-radius:8px; padding:14px 24px; text-align:center; min-width:400px;">
        <div style="font-size:0.72rem; color:#ef444490; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px;">&#9888; 不穩定、不可預測</div>
        <div style="font-size:1rem; font-weight:700; color:#ef4444;">upstream rate-api</div>
        <div class="detail" style="color:#ef444480;">執行昂貴的 ML 推論；~28% 失敗率 — 5xx &nbsp;·&nbsp; timeout &nbsp;·&nbsp; HTTP 200 帶錯誤 body &nbsp;·&nbsp; HTTP 200 但缺少 rate 欄位</div>
      </div>

      <div class="flow-arrow">&#9660;</div>

      <!-- RateApiClient — the star, IS the ACL -->
      <div style="background:#38bdf818; border:2px solid #38bdf8; border-radius:8px; padding:14px 24px; text-align:center; min-width:400px; box-shadow:0 0 18px #38bdf825;">
        <div style="margin-bottom:8px;"><span style="font-size:0.88rem; font-weight:800; color:#38bdf8; background:#0f172a; border:2px solid #38bdf8; border-radius:5px; padding:4px 14px; letter-spacing:0.06em; box-shadow:0 0 10px #38bdf850;">Anti-Corruption Layer</span></div>
        <div style="font-size:1.05rem; font-weight:800; color:#38bdf8;">RateApiClient</div>
        <div class="detail" style="color:#38bdf8cc; margin-bottom:4px;">發出 HTTP 呼叫 &nbsp;·&nbsp; 解析回應 &nbsp;·&nbsp; 成功時回傳乾淨的 <code style="color:#38bdf8;">Integer</code></div>
        <div class="detail"><span style="color:#38bdf880;">any failure → typed exception: UnauthorizedError &nbsp;·&nbsp; QuotaExhaustedError &nbsp;·&nbsp; TimeoutError &nbsp;·&nbsp; UpstreamError</span></div>
      </div>

      <div class="flow-arrow">&#9660;</div>

      <!-- PricingService — secondary -->
      <div style="background:#1e293b; border:1px solid #334155; border-radius:8px; padding:12px 24px; text-align:center; min-width:400px;">
        <div style="font-size:0.95rem; font-weight:600; color:#94a3b8;">PricingService</div>
        <div class="detail" style="color:#64748b;">協調 cache → lock → quota → fetch；不直接接觸原始 HTTP；捕捉每種型別化例外並組合正確的 HTTP 狀態碼 + 客戶端訊息</div>
      </div>

      <div class="flow-arrow" style="color:#475569;">&#9660;</div>

      <div style="background:#1e293b; border:1px solid #334155; border-radius:8px; padding:12px 24px; text-align:center; min-width:400px;">
        <div style="font-size:0.95rem; font-weight:600; color:#94a3b8;">Controller</div>
        <div class="detail" style="color:#64748b;">驗證參數（period &nbsp;·&nbsp; hotel &nbsp;·&nbsp; room）；根據 PricingService 的狀態渲染 JSON 回應</div>
      </div>

    </div>

    <table>
      <thead><tr><th>情境</th><th>誰拋出</th><th>客戶端狀態碼</th><th>客戶端訊息</th><th>客戶端動作</th></tr></thead>
      <tbody>
        <tr><td>無效參數</td><td>Controller</td><td><span class="status-badge s-400">400</span></td><td>Missing required parameters / Invalid period</td><td>修正請求</td></tr>
        <tr><td>每日配額耗盡</td><td>QuotaGuard</td><td><span class="status-badge s-429">429</span></td><td>Daily quota reached — requests resume at midnight UTC</td><td>等待 Retry-After</td></tr>
        <tr><td>Upstream 回傳 HTTP 429（token 限制）</td><td>RateApiClient</td><td><span class="status-badge s-429">429</span></td><td>Upstream API quota exhausted — token limit reached</td><td>等待 Retry-After</td></tr>
        <tr><td>無效 token（401）</td><td>RateApiClient</td><td><span class="status-badge s-502">502</span></td><td>Upstream authentication failed</td><td>—</td></tr>
        <tr><td>Upstream 200 但 body 為錯誤</td><td>RateApiClient</td><td><span class="status-badge s-502">502</span></td><td>Upstream error</td><td>—</td></tr>
        <tr><td>Upstream 200 但缺少 rate 欄位</td><td>RateApiClient</td><td><span class="status-badge s-502">502</span></td><td>Upstream error</td><td>—</td></tr>
        <tr><td>Upstream 5xx</td><td>RateApiClient</td><td><span class="status-badge s-502">502</span></td><td>Upstream error</td><td>—</td></tr>
        <tr><td>Upstream 逾時</td><td>RateApiClient</td><td><span class="status-badge s-504">504</span></td><td>Upstream timed out</td><td>—</td></tr>
        <tr><td>Follower 等待逾時</td><td>LockAndFetchRate</td><td><span class="status-badge s-504">504</span></td><td>Request timed out waiting for upstream result</td><td>—</td></tr>
        <tr><td>非預期錯誤</td><td>StandardError catch-all</td><td><span class="status-badge s-500">500</span></td><td>非預期錯誤</td><td>—</td></tr>
      </tbody>
    </table>
    <p>兩種 429 回應都包含 <code>Retry-After</code> header（到 UTC 午夜的秒數）。其他所有錯誤回應只回傳狀態碼和訊息 — 不提供重試指引。</p>
  </div>
</div>

<div class="decision" data-id="d7">
  <div class="decision-header" onclick="toggleDecision(this)">
    <div class="decision-num">7</div>
    <div class="decision-title">可觀測性</div>
    <div class="decision-choice">Lograge structured logs</div>
    <div class="decision-arrow">&#9656;</div>
  </div>
  <div class="decision-body">
    <p>每個請求輸出一行 JSON log，包含：<code>method</code>、<code>path</code>、<code>status</code>、<code>duration</code>、<code>cache_status</code>（<code>"hit"</code> 或 <code>"miss"</code>）和 <code>upstream_latency_ms</code>。</p>
    <pre><span class="comment">// Example log line:</span>
{"method":"GET","path":"/api/v1/pricing","status":<span class="number">200</span>,"duration":<span class="number">12.3</span>,
 "cache_status":"<span class="string">hit</span>","upstream_latency_ms":<span class="keyword">null</span>}</pre>
    <p><b>為什麼選 Lograge 而不是付費服務（Datadog、New Relic）：</b>Lograge 免費、零設定，隨 Rails 提供。對這樣的案例研究，結構化 JSON log 足以展示可觀測性的思維。在 production 環境中，這些 JSON 行可以直接導入任何 log 聚合器。</p>
    <p><b>為什麼重要：</b>「你怎麼知道這個服務在 production 是健康的？」有了具體答案 — 篩選 <code>cache_status=miss</code>，觀察 <code>upstream_latency_ms</code>。</p>
  </div>
</div>

<!-- ==================== Failure Modes ==================== -->
<section id="failures">
<h2>故障情境</h2>
<p style="color:#94a3b8; margin-top:-8px; margin-bottom:18px;">每個依賴項目失敗時會發生什麼，以及為什麼每日 1,000 次上限仍然成立。</p>

<table>
  <thead>
    <tr><th>什麼失敗了</th><th>內部發生什麼</th><th>客戶端看到</th><th>對 Upstream 的影響</th><th>恢復方式</th></tr>
  </thead>
  <tbody>
    <tr>
      <td><b>Redis 完全停機</b><br><span style="font-size:0.82rem; color:#94a3b8;">例如崩潰、OOM、網路分區</span></td>
      <td>Rails 內建的 cache 錯誤處理器吞掉 Redis 錯誤並回傳 nil &rarr; <code>Rails.cache.write(..., unless_exist: true)</code> 回傳 nil &rarr; LockAndFetchRate 進入 follower 分支 &rarr; <code>poll_for_result</code> 看到 nil 持續 6s &rarr; 拋出 <code>LockAndFetchRate::TimeoutError</code></td>
      <td><span class="status-badge s-504">504</span> "Request timed out waiting for upstream result"</td>
      <td><b style="color:#10b981;">0 次</b> &mdash; 無人取得 lock，upstream 永遠不會被觸及</td>
      <td>Redis 恢復後服務立即回復（已由壓力與混沌測試中的 <a href="#verified">Redis 崩潰時 fail-closed</a> 測試驗證）</td>
    </tr>
    <tr>
      <td><b>Redis 重啟</b><br><span style="font-size:0.82rem; color:#94a3b8;">例如部署、OOM、容器重啟</span></td>
      <td>AOF 重播所有資料 — cache、lock、計數器 — 保留原本的到期時間。過期 lock 在 7s 內自動過期（與 leader 崩潰相同）；cache 維持在 5 分鐘的有效窗口內；計數器繼續計數。最多 ~1s 的寫入可能遺失（<code>appendfsync everysec</code> 預設值）。</td>
      <td>重啟期間短暫不可用（幾秒鐘）；AOF 重播後恢復正常讀取</td>
      <td><b style="color:#10b981;">0 次</b> &mdash; cache 和計數器都存活；不需要額外取資料</td>
      <td>透過 AOF + persistent volume 自我修復。1,000/天上限<b>跨重啟</b>仍然成立，不只是在單次運行期間。</td>
    </tr>
    <tr>
      <td><b>Leader 在取資料中途崩潰</b><br><span style="font-size:0.82rem; color:#94a3b8;">例如 <code>kill -9</code>、OOM、容器重啟</span></td>
      <td><code>ensure</code> 不會執行 &rarr; lock 保持持有直到 7s 自動過期 &rarr; followers 等待並在 6s 時超時。<b style="color:#f59e0b;">每個 leader 持有唯一的 UUID（fencing token）</b>，因此一個在過期後才醒來的緩慢 leader 不會意外刪除新 leader 的 lock。</td>
      <td><span class="status-badge s-504">504</span> "Request timed out waiting for upstream result"</td>
      <td><b style="color:#10b981;">≤1 次</b> &mdash; leader 在打 upstream 前崩潰為 0 次，期間或之後崩潰為 1 次</td>
      <td>等待最多 7s 讓 lock 自動過期（即 lock TTL）。之後下一個請求成為新的 leader。</td>
    </tr>
    <tr>
      <td><b>Upstream 逾時</b><br><span style="font-size:0.82rem; color:#94a3b8;">5s HTTParty timeout（~7%）</span></td>
      <td>RateApiClient 捕捉 <code>Net::ReadTimeout</code>，拋出 TimeoutError &rarr; 釋放 lock</td>
      <td><span class="status-badge s-504">504</span> "Upstream timed out"</td>
      <td><b style="color:#10b981;">1 次</b> &mdash; 失敗的嘗試消耗了配額</td>
      <td>下一個請求成為新的 leader 並重試 upstream。</td>
    </tr>
    <tr>
      <td><b>Upstream HTTP 5xx</b><br><span style="font-size:0.82rem; color:#94a3b8;">~7% 機率，來自<a href="upstream_behavior.html">真實測試</a></span></td>
      <td>RateApiClient 看到非 200 狀態，拋出 UpstreamError &rarr; 釋放 lock，不寫入 cache</td>
      <td><span class="status-badge s-502">502</span> "Upstream error"</td>
      <td><b style="color:#10b981;">1 次</b> &mdash; 失敗的嘗試消耗了配額</td>
      <td>下一個請求成為新的 leader 並重試 upstream。</td>
    </tr>
    <tr>
      <td><b>Upstream 回傳 200 但 body 為錯誤</b><br><span style="font-size:0.82rem; color:#94a3b8;">~7% 機率，來自<a href="upstream_behavior.html">真實測試</a></span></td>
      <td>RateApiClient 解析 body，發現沒有 <code>rate</code> 欄位，拋出 UpstreamError &rarr; 釋放 lock，不寫入 cache</td>
      <td><span class="status-badge s-502">502</span> "Upstream error"</td>
      <td><b style="color:#10b981;">消耗 1 次</b> &mdash; 但我們刻意不 cache 錯誤回應。下一個請求重試，cache 中不會留下過期的垃圾資料。</td>
      <td>下一個請求成為新的 leader 並重試 upstream。</td>
    </tr>
    <tr>
      <td><b>Upstream 回傳垃圾值</b><br><span style="font-size:0.82rem; color:#94a3b8;">未知飯店、零或負數房價、小數字串、缺少欄位</span></td>
      <td>RateApiClient 對每筆記錄執行 <b style="color:#f59e0b;">dry-schema</b> + 正數檢查。壞記錄被記錄並跳過；其餘仍然被 cache。</td>
      <td>若請求的房價通過驗證，服務仍回傳該值；否則回傳 <span class="status-badge s-502">502</span></td>
      <td><b style="color:#10b981;">1 次</b> &mdash; 部分回應仍勝於完全沒有</td>
      <td>一筆壞資料不會讓 35 筆好資料也無法被 cache。如果<i>所有</i>記錄都無效，整個回應才會被拒絕。</td>
    </tr>
    <tr>
      <td><b>Upstream 401（驗證失敗）</b><br><span style="font-size:0.82rem; color:#94a3b8;">例如需要更換 token</span></td>
      <td>RateApiClient 拋出 UnauthorizedError &rarr; PricingService 捕捉 &rarr; <b>退還配額單位</b>（呼叫在處理前就被拒絕）</td>
      <td><span class="status-badge s-502">502</span> "Upstream authentication failed"</td>
      <td><b style="color:#10b981;">1 次但配額已退還</b> &mdash; <code>QuotaGuard.refund_quota!</code> 確保無效 token 不會消耗預算</td>
      <td>操作人員必須更換 token。在此之前，每次 cache miss 消耗 1 個配額然後退還 &mdash; 預算保持完整。</td>
    </tr>
    <tr>
      <td><b>Upstream HTTP 429（他們的 rate limit）</b><br><span style="font-size:0.82rem; color:#94a3b8;">~0.1% 機率 — upstream 每日上限已達</span></td>
      <td>RateApiClient 拋出 QuotaExhaustedError &rarr; PricingService 捕捉</td>
      <td><span class="status-badge s-429">429</span> + <code>Retry-After</code> header</td>
      <td><b style="color:#10b981;">1 次</b> &mdash; 被拒絕的呼叫在 upstream 端仍計入</td>
      <td>等待 upstream 的窗口重置（假設 UTC 午夜，見決策 4）。我們的 QuotaGuard 在呼叫前就在本地捕捉相同條件 — 這一行是我們的計數器與 upstream 計數器偶爾出現差異的罕見競態。</td>
    </tr>
    <tr>
      <td><b>配額計數器達到 1,000</b><br><span style="font-size:0.82rem; color:#94a3b8;">當日預算耗盡</span></td>
      <td>QuotaGuard 的原子 INCR 回傳 1001 &rarr; 在 RateApiClient 被呼叫<b>之前</b>拋出 ExhaustedError</td>
      <td><span class="status-badge s-429">429</span> + <code>Retry-After</code> header（到 UTC 午夜的秒數）</td>
      <td><b style="color:#10b981;">0 次</b> &mdash; 確定性保證 1,000 永遠不會被超出（已由壓力與混沌測試中的<a href="#verified">配額硬性上限</a>測試驗證）</td>
      <td>計數器透過 <code>EXPIREAT</code> 在 UTC 午夜自動重置。<b>命中 cache 的使用者仍能取得房價</b> — 只有需要重新取資料的請求會被阻擋。</td>
    </tr>
  </tbody>
</table>

<div class="card blue" style="margin-top:18px;">
  <h4>設計原則</h4>
  <p>每個依賴失敗都導向 5xx 回應。當保護層（cache / lock / quota）降級時，服務<b>絕不</b>打 upstream。這就是「fail-closed」— 以自身可用性換取保護 upstream 合約，對 proxy 來說這是正確的優先順序。</p>
</div>

</section>

<!-- ==================== Upstream API ==================== -->
<section id="upstream">
<h2>Upstream API 觀察</h2>
<p>實作前對 upstream rate API 進行兩次真實測試 — 各 1,001 次呼叫。<span style="color:#ef4444;font-weight:600;">~28% 失敗率</span>，涵蓋 4 種不同的失敗模式，在單次與批次請求中均已確認。</p>

<div class="finding danger">
  <div class="finding-title" style="font-size:1.08rem;font-weight:700;color:#f1f5f9;">HTTP 200 不代表成功</div>
  <div class="finding-row"><span class="finding-label">發現</span><span class="finding-value">Upstream 在三種不同失敗模式下都回傳 <span class="status-badge s-200">200</span>：body 含錯誤且無 <code>rates</code> key（~7%）、回應中悄悄缺少 <code>rate</code> 欄位（~7%）、<code>rates</code> 陣列為空。光靠 HTTP 狀態碼無法信任。</span></div>
  <div class="finding-row"><span class="finding-label">決策</span><span class="finding-value"><code>RateApiClient</code> 對每個 200 都檢查 response body — 每種失敗模式都拋出 <code>UpstreamError</code>，永不悄悄回傳 nil。</span></div>
</div>

<div class="finding warn">
  <div class="finding-title" style="font-size:1.08rem;font-weight:700;color:#f1f5f9;">缺少 <code>rate</code> 欄位不等於配額耗盡</div>
  <div class="finding-row"><span class="finding-label">發現</span><span class="finding-value">初始設計假設缺少 <code>rate</code> 欄位代表配額耗盡。測試證明並非如此 — 缺少欄位是間歇性處理錯誤（~7%，與配額無關）。配額耗盡有自己的訊號：<span class="status-badge s-429">429</span> 加上 <code>{"error":"Rate limit exceeded (1000/day)"}</code>。</span></div>
  <div class="finding-row"><span class="finding-label">決策</span><span class="finding-value">HTTP 429 → <code>QuotaExhaustedError</code>。缺少 rate → <code>UpstreamError</code>。兩種獨立例外，兩條獨立回應路徑。</span></div>
</div>

<div class="finding warn">
  <div class="finding-title" style="font-size:1.08rem;font-weight:700;color:#f1f5f9;">401 不消耗 upstream 配額 — 驗證失敗時退還配額</div>
  <div class="finding-row"><span class="finding-label">發現</span><span class="finding-value">實驗驗證：1,000 次無效 token 呼叫後緊接一次有效呼叫，回傳 200 而非 429。Upstream 在任何處理發生前就拒絕 401。</span></div>
  <div class="finding-row"><span class="finding-label">決策</span><span class="finding-value"><code>QuotaGuard</code> 在每次 upstream 呼叫前預先消耗一個單位。發生 401 時退還該單位 — 請求從未到達 upstream 的處理階段。</span></div>
</div>

<div style="margin-top:20px;text-align:center;">
  <a href="upstream_behavior.html" class="report-link">完整測試資料與錯誤對應 &rarr;</a>
</div>
</section>

<!-- ==================== Challenge ==================== -->
<section id="challenge">
<h2>The Challenge</h2>

<div style="background:linear-gradient(135deg, #78350f50, #43140730); border:1px solid #f59e0b55; padding:20px 24px; border-radius:10px; margin:0 0 18px 0; color:#cbd5e1; font-style:italic;">
  &ldquo;Our Data and AI team built a powerful model to handle this, but its inference process is <b style="color:#ef4444;">computationally expensive</b> to run. To make this product more cost-effective, we analyzed the model's output and found that a calculated room rate remains effective for up to 5 minutes.&rdquo;
  <div style="font-style:normal; font-size:0.82rem; color:#64748b; margin-top:6px;">— Hospitality pricing scenario</div>
</div>

<div class="card blue">
  <h4>What the constraint really means</h4>
  <p>Every upstream call burns <b style="color:#ef4444;">expensive inference compute</b>. So I scoped the goal beyond &ldquo;stay under 1,000/day&rdquo;: <span class="highlight">minimise real calls</span>. Our service must serve <b>1,000,000+ requests/day</b> from this 1,000/day budget.</p>
</div>

<div class="card yellow">
  <h4>Why cache alone isn't enough</h4>
  <p>36 parameter combinations (4 periods &times; 3 hotels &times; 3 rooms) &times; 288 five-minute windows/day:</p>
  <div class="math">36 &times; 288 = 10,368 possible cache misses/day</div>
  <p>Way over the 1,000-call budget. We need <b>batch fetching</b> + <b>request coalescing</b> + a <b>hard quota cap</b>.</p>
</div>
</section>

<!-- ==================== 4 Layers Funnel ==================== -->
<section id="funnel">
<h2>My Solution &mdash; 4 Layers of Protection</h2>

<div style="background:linear-gradient(135deg, #064e3b50, #052e1630); border:1px solid #10b98155; padding:20px 24px; border-radius:10px; margin-bottom:18px;">
  <div style="font-size:1.15rem; color:#10b981; font-weight:700; letter-spacing:0.3px; margin-bottom:8px;">
    Lazy fallback + Bulk fetch &nbsp;&rarr;&nbsp; <span style="font-size:1.4rem;">0 ~ 288 calls / day</span>

  <div style="color:#cbd5e1; line-height:1.55; font-size:0.97rem;">
    <b>288</b> = math floor on the upper bound (24h &div; 5-min TTL, bulk fetch returns all 36 rates per call). <b style="color:#10b981;">0</b> = lazy lower bound (no upstream calls when nobody's asking). &nbsp;
    <b style="color:#10b981;">Why not prewarming?</b> The spec calls inference <b style="color:#ef4444;">computationally expensive</b>, so spend should track real demand &mdash; prewarming burns a fixed 288/day even when zero clients are asking.
  </div>
  <div style="margin-top:12px; padding-top:12px; border-top:1px solid #10b98130; color:#cbd5e1; line-height:1.55; font-size:0.95rem;">
    <b style="color:#10b981;">Hard ceiling:</b> 1,000/day enforced locally by <b>QuotaGuard</b> &mdash; holds even if the layers above break or upstream's own rate limiter misconfigures.
  </div>
</div>
