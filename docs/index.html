<!-- ==================== Architecture ==================== -->
<section id="architecture">
<h2>Architecture</h2>

<p style="color:#94a3b8; margin-bottom:18px;">The full picture: client → Rails app (4 layers) → Redis + upstream. Each layer is detailed in its own section below.</p>

<img src="architecture.jpg" alt="System architecture diagram" style="width:100%; max-width:100%; height:auto; border-radius:10px; border:1px solid #334155; margin-bottom:20px;">

<div class="card blue" style="margin-top:18px;">
  <h4>Deployment note &mdash; <span style="color:#f59e0b;">single Redis instance</span> assumption</h4>
  <p>The implementation assumes a <b style="color:#f59e0b;">single Redis instance</b>. Under Sentinel / Cluster HA, the <code>LockAndFetchRate</code> SETNX can be lost during primary failover &mdash; a brief window where two leaders may exist.</p>
  <p style="margin-top:8px;">For production HA, the standard answer is a consensus-backed coordinator like <b>etcd</b>, <b>Consul</b>, or <b>ZooKeeper</b> (Raft/Paxos under the hood). <b>Redlock</b> improves on a single Redis but has known safety issues under clock skew or GC pauses, as discussed in <a href="https://martin.kleppmann.com/2016/02/08/how-to-do-distributed-locking.html" target="_blank" style="color:#38bdf8;">Martin Kleppmann's distributed-locking analysis</a>. The atomic <code>QuotaGuard</code> counter is a second line of defence &mdash; even if two leaders briefly co-exist, the daily upstream cap still holds.</p>
</div>
</section>

<!-- ==================== Layer 1: RateCache ==================== -->
<section id="cache">
<h2>Layer 1: Cache</h2>
<p style="color: #64748b; font-size: 0.88rem; margin-top: -8px;"><code>app/services/rate_cache.rb</code></p>

<div class="card green">
  <h4>Background</h4>
  <p>The upstream API is expensive (1,000 calls/day). The same <code>(period, hotel, room)</code> returns the same rate for a while.</p>
</div>
<div class="card red">
  <h4>Problem</h4>
  <p>Without caching, every request triggers an upstream call. At 1,000,000 requests/day we'd blow through the quota very fast.</p>
</div>
<div class="card blue">
  <h4>Solution</h4>
  <p>Cache each rate by <code>(period, hotel, room)</code> with a <span class="highlight">5-minute TTL</span>. Within that window, all requests for the same combo are served from cache &mdash; zero upstream calls.</p>
  <pre>cache key: <span class="string">"pricing:Summer:FloatingPointResort:SingletonRoom"</span>
TTL: <span class="number">5 minutes</span>
Total keys: <span class="number">36</span> (4 periods &times; 3 hotels &times; 3 rooms)</pre>
</div>
</section>

<!-- ==================== Layer 2: LockAndFetchRate ==================== -->
<section id="lock">
<h2>Layer 2: Thundering Herd Protection</h2>
<p style="color: #64748b; font-size: 0.88rem; margin-top: -8px;"><code>app/services/lock_and_fetch_rate.rb</code></p>

<div class="card green">
  <h4>Background</h4>
  <p>Cache entries expire every 5 minutes. At the moment of expiry, many requests can arrive at the same time and all see a cache miss.</p>
</div>
<div class="card red">
  <h4>Problem</h4>
  <p>Without coordination, every concurrent cache-miss request calls upstream independently. A burst of 50 requests burns 50 quota units instead of 1.</p>
</div>
<div class="card blue">
  <h4>Solution</h4>
  <p>Use a Redis lock (<code>SET NX</code>) with a <b>global</b> lock key (<code>lock_and_fetch_rate:pricing:bulk_fetch</code>) to elect one &ldquo;leader&rdquo;. The leader calls upstream and fills all 36 cache entries. All &ldquo;followers&rdquo; wait and read from the freshly populated cache.</p>
  <div class="math">50 simultaneous requests = 1 upstream call = 1 quota unit = 36 cached rates</div>
</div>

<h3 id="timing-chain">Timing Chain Design</h3>
<p>Three values form a chain — each depends on the previous:</p>

<div class="timing">
  <div class="timing-box t1">5s<span class="label">UPSTREAM_TIMEOUT</span></div>
  <div class="timing-arrow">&rarr; +1s &rarr;</div>
  <div class="timing-box t2">6s<span class="label">FOLLOWER_TIMEOUT</span></div>
  <div class="timing-arrow">&rarr; +1s &rarr;</div>
  <div class="timing-box t3">7s<span class="label">LOCK_AUTO_EXPIRE</span></div>
</div>

<div class="card blue">
  <h4>UPSTREAM_TIMEOUT (5s) — defined in RateApiClient</h4>
  <p>Without a timeout, if upstream hangs, the request blocks forever and ties up a Puma worker. 5s gives upstream enough time to respond normally, but frees the worker quickly when upstream is down.</p>
</div>
<div class="card yellow">
  <h4>FOLLOWER_TIMEOUT (6s) — why not exactly 5s?</h4>
  <p>The leader could get the upstream response at 4.9s, write cache, but the follower already gave up at 5.0s — wasted the whole wait. The 1s buffer covers this edge case.</p>
</div>
<div class="card purple">
  <h4>LOCK_AUTO_EXPIRE (7s) — safety net</h4>
  <p>Normally <code>ensure</code> deletes the lock right away after the leader finishes. But if the process crashes hard (e.g. <code>kill -9</code>), <code>ensure</code> never runs and the lock is stuck. 7s auto-expire is the safety net.</p>
  <p>It must be longer than FOLLOWER_TIMEOUT (6s). If shorter, the lock expires while followers are still waiting &rarr; a new request grabs the lock &rarr; becomes a second leader &rarr; calls upstream again &rarr; wastes quota.</p>
</div>
<div class="card green">
  <h4>FOLLOWER_POLL_INTERVAL (50ms)</h4>
  <p>1ms = too fast, floods Redis. 1s = too slow, follower waits up to 1s after leader finishes. 50ms = good balance. At most 50ms extra latency.</p>
</div>

<div style="text-align:center;"><a href="lock_and_fetch_rate_demo.html" class="demo-link">Open Interactive Demo &rarr;</a></div>
</section>

<!-- ==================== Layer 3: QuotaGuard ==================== -->
<section id="quota">
<h2>Layer 3: Quota Guard</h2>
<p style="color: #64748b; font-size: 0.88rem; margin-top: -8px;"><code>app/services/quota_guard.rb</code></p>

<div class="card green">
  <h4>Background &mdash; a fast-fail tripwire</h4>
  <p>With Batch Fetch, the theoretical maximum is only 288 calls/day &mdash; well under the 1,000 budget. Under normal operation, QuotaGuard will <b>never trigger</b>. It exists as a <b>local tripwire</b> for scenarios that shouldn't happen but could &mdash; bugs that turn every cache miss into an upstream call:</p>
  <ul style="margin: 8px 0 12px 20px; font-size: 0.95rem; line-height: 1.8;">
    <li><b>Upstream changes response format</b> &mdash; e.g. upstream renames <code>rate</code> to <code>price</code>. Parser fails, cache stays empty, every request hits upstream until upstream itself starts rejecting.</li>
    <li><b>Bug in cache write</b> &mdash; e.g. <code>RateCache.write_all</code> has a typo in the key name. Writes succeed silently but reads never match &rarr; same runaway loop.</li>
  </ul>
  <p>Normally the 1,001st call is rejected up front with 429 &mdash; upstream never runs the expensive inference for it. But if that limiter ever misconfigures (bug, redeploy, staging quirk), our overflow would actually hit the <b style="color:#ef4444;">computationally expensive</b> inference and burn real compute. <b>QuotaGuard keeps us honest to the 1,000/day contract <span style="color:#f59e0b;">regardless of upstream's enforcement state</span>.</b></p>
  <div style="background:#1e293b40; border-left:3px solid #f59e0b; padding:10px 14px; border-radius:0 6px 6px 0; margin-top:8px;">
    <p style="margin:0 0 6px;"><b style="color:#f59e0b;">Trade-offs accepted:</b></p>
    <ul style="margin:0 0 0 18px; font-size:0.95rem;">
      <li><b>Duplicated state</b> &mdash; the cap is enforced in two places (upstream &amp; here). If upstream relaxes to 2,000, <code>DAILY_LIMIT</code> needs updating too.</li>
      <li><b>Added complexity</b> &mdash; ~50 lines of code + tests + a Redis dependency for a layer that should never trigger in normal operation. A minimalist approach would skip QuotaGuard and trust upstream's own 429, accepting the small latency / observability cost.</li>
    </ul>
  </div>
</div>
<div class="card red">
  <h4>Problem</h4>
  <p>Multiple Puma workers handle requests in parallel. A naive &ldquo;read &rarr; check &rarr; increment&rdquo; has a race condition: two workers could both read 999, both pass the check, and both call upstream.</p>
  <pre><span class="comment">// Race condition example:</span>
Worker A: read count &rarr; <span class="number">999</span> &rarr; passes check &rarr; calls upstream   <span class="comment">// count is now 1000</span>
Worker B: read count &rarr; <span class="number">999</span> &rarr; passes check &rarr; calls upstream   <span class="comment">// EXCEEDED!</span></pre>
</div>
<div class="card blue">
  <h4>Solution</h4>
  <p>Redis <code>INCR</code> is atomic &mdash; it increments and returns the new value in one step. Each request gets a unique sequential number. Exactly 1,000 calls pass through. No race condition.</p>
  <pre>daily key: <span class="string">"quota:2026-04-22"</span>    <span class="comment">// auto-expires at midnight</span>
Redis INCR &rarr; <span class="number">1000</span> &rarr; pass &#10003;
Redis INCR &rarr; <span class="number">1001</span> &rarr; raise ExhaustedError &#10007;</pre>
</div>

<div class="card yellow">
  <h4>Why 1,000 and not 900?</h4>
  <p>Because INCR is atomic, there's no way to overshoot. A lower buffer only makes sense with a gradual slowdown strategy. We use a hard stop with <code>Retry-After</code> until midnight, so capping lower just wastes quota.</p>
</div>

<div class="card red">
  <h4>Assumption: quota resets at UTC midnight</h4>
  <p>The upstream the upstream rate API documentation does not specify when the daily quota resets. This implementation assumes <b>UTC midnight</b> &mdash; the Redis key uses <code>quota:YYYY-MM-DD</code> (UTC) and the <code>Retry-After</code> header counts seconds until UTC 00:00. If the actual reset time differs, only the key date logic and Retry-After calculation need to change.</p>
</div>
</section>

<!-- ==================== Layer 4: Batch Fetch ==================== -->
<section id="batch">
<h2>Layer 4: Batch Fetch</h2>
<p style="color: #64748b; font-size: 0.88rem; margin-top: -8px;"><code>lib/rate_api_client.rb</code> &rarr; <code>get_all_rates</code></p>

<div class="card green">
  <h4>Background</h4>
  <p>The upstream API accepts multiple rate queries in a single request. There are 36 possible combinations (4 periods &times; 3 hotels &times; 3 rooms).</p>
</div>
<div class="card red">
  <h4>Problem</h4>
  <p>Without batching, each cache miss fetches only one rate &mdash; one quota unit per rate. Even with LockAndFetchRate, the worst case is 36 cache misses &times; 288 windows = 10,368 calls/day.</p>
</div>
<div class="card blue">
  <h4>Solution</h4>
  <p>On any cache miss, fetch <b>all 36 rates</b> in a single API call via <code>RateApiClient.get_all_rates</code>. Then <code>RateCache.write_all</code> fills every cache key at once. One quota unit refreshes the entire cache for the next 5 minutes.</p>
  <div class="math">1 API call &rarr; 36 cache entries &rarr; 5 minutes of full coverage</div>
</div>

<div class="comparison">
  <div class="side before">
    <h4>Without Batch</h4>
    <pre>Cache miss for <span class="string">"Summer:FloatingPointResort:SingletonRoom"</span>
  &rarr; fetch <span class="number">1</span> rate
  &rarr; write <span class="number">1</span> cache entry
  &rarr; <span class="number">1</span> quota unit for <span class="number">1</span> rate</pre>
    <p style="font-size:0.95rem;">Worst case: <span style="color:#ef4444; font-weight:600;">10,368 calls/day</span></p>
  </div>
  <div class="side after">
    <h4>With Batch</h4>
    <pre>Cache miss for <span class="string">"Summer:FloatingPointResort:SingletonRoom"</span>
  &rarr; fetch <span class="number">36</span> rates (all combos)
  &rarr; write <span class="number">36</span> cache entries
  &rarr; <span class="number">1</span> quota unit for <span class="number">36</span> rates</pre>
    <p style="font-size:0.95rem;">Worst case: <span style="color:#10b981; font-weight:600;">288 calls/day</span> (= theoretical minimum)</p>
  </div>
</div>
</section>

<!-- ==================== Request Flow ==================== -->
<section id="flow">
<h2>Request Flow</h2>

<div class="flow">
  <div class="flow-step controller">
    <b>PricingController</b>
    <div class="detail">Validate params &rarr; 400 if invalid; render service errors with proper status (429, 502, 504)</div>
  </div>
  <div class="flow-arrow">&#9660;</div>
  <div class="flow-step service">
    <b>PricingService</b>
    <div class="detail">Orchestrates the full flow, maps errors to HTTP status codes</div>
  </div>
  <div class="flow-arrow">&#9660;</div>
  <div class="flow-step cache">
    <b>&oplus; RateCache.read</b>
    <div class="detail">Cache hit? &rarr; return immediately, skip everything below</div>
  </div>
  <div class="flow-arrow">&#9660; cache miss</div>
  <div class="flow-step lock">
    <b>&oplus; LockAndFetchRate.call</b>
    <div class="detail">Grab Redis lock &rarr; only one request proceeds (leader), others wait (followers)</div>
  </div>
  <div class="flow-arrow">&#9660; leader only</div>
  <div class="flow-step quota">
    <b>&oplus; QuotaGuard.consume_quota!</b>
    <div class="detail">Atomic Redis INCR &mdash; if count > 1,000, raise ExhaustedError</div>
  </div>
  <div class="flow-arrow">&#9660;</div>
  <div class="flow-step api">
    <b>&oplus; RateApiClient.get_all_rates</b>
    <div class="detail">POST all 36 combinations in one request &rarr; 1 API call = 1 quota unit</div>
  </div>
  <div class="flow-arrow">&#9660;</div>
  <div class="flow-step cache">
    <b>&oplus; RateCache.write_all (36 rates)</b>
    <div class="detail">Fill entire cache in one shot &rarr; all 36 keys get 5-min TTL</div>
  </div>
</div>

</section>

<!-- ==================== Design Decisions ==================== -->
<section id="decisions">
<h2>Design Decisions</h2>
<p>Each decision lists the options considered, the choice, and the trade-off consciously accepted. Click to expand.</p>

<div class="decision open" data-id="d1">
  <div class="decision-header" onclick="toggleDecision(this)">
    <div class="decision-num">1</div>
    <div class="decision-title">When to fetch upstream <span style="color:#64748b; font-size:0.85rem; font-weight:400;">(Lazy vs Prewarming)</span></div>
    <div class="decision-choice">Lazy on-demand</div>
    <div class="decision-arrow">&#9656;</div>
  </div>
  <div class="decision-body">
    <p>Bulk fetching itself isn't a real choice &mdash; the math forces it: 36 combos &times; 288 cache windows/day = <b>10,368 calls</b>, way over the 1,000 budget. So <i>each</i> upstream call has to return all 36 rates. Under a 5-min TTL, <b>288/day is the math floor on the upper bound</b> &mdash; no compliant design can do fewer at peak. The interesting question is <b>when</b> to trigger that call: on the first cache miss (lazy &mdash; <b style="color:#10b981;">0 at the lower bound</b>), or on a schedule (prewarming &mdash; always &ge; 288).</p>
    <table>
      <thead><tr><th>Option</th><th>Behaviour</th></tr></thead>
      <tbody>
        <tr>
          <td>Periodic prewarming<br><span style="font-size:0.82rem; color:#94a3b8;">e.g. Sidekiq cron every 4 min</span></td>
          <td>Cache always warm, every request is instant. <b>But:</b> burns <b>360 calls/day</b> even at zero traffic; needs extra infra (Sidekiq + scheduler).</td>
        </tr>
        <tr>
          <td><b>Lazy on-demand</b> &#10003;</td>
          <td><b style="color:#f59e0b;">Upstream cost proportional to actual demand</b> &mdash; 0 calls when nobody's asking, up to 288/day at full traffic. No extra infra.</td>
        </tr>
      </tbody>
    </table>
    <p><b>Why lazy fits this workload:</b></p>
    <ul style="margin:6px 0 8px 20px;">
      <li>Spec frames upstream as <b style="color:#ef4444;">computationally expensive</b> &mdash; we want to burn quota only when there's real demand</li>
      <li>Hospitality traffic is uneven (peak season, rush hours, dead hours); lazy adapts naturally</li>
      <li>Tight 1,000/day budget rewards proportional usage; prewarming's fixed 360/day leaves no room if traffic spikes break the cache math</li>
    </ul>
    <p style="background:#1e293b40; border-left:3px solid #f59e0b; padding:10px 14px; border-radius:0 6px 6px 0; margin-top:8px;"><b style="color:#f59e0b;">Prewarming is the right call when:</b> traffic is predictable and steady, latency SLAs are strict (any cache miss is unacceptable), or the quota budget is generous. For those workloads, prewarming wins. Different constraint, different answer.</p>
    <p><b>Trade-off accepted:</b> the first user to hit an expired cache pays a small latency tax (waits for the upstream call). All subsequent requests in that 5-min window are instant cache hits.</p>
  </div>
</div>

<div class="decision" data-id="d2">
  <div class="decision-header" onclick="toggleDecision(this)">
    <div class="decision-num">2</div>
    <div class="decision-title">Shared cache backend <span style="color:#64748b; font-size:0.85rem; font-weight:400;">(L1–L3)</span></div>
    <div class="decision-choice">Redis</div>
    <div class="decision-arrow">&#9656;</div>
  </div>
  <div class="decision-body">
    <table>
      <thead><tr><th>Option</th><th>Rejected because</th></tr></thead>
      <tbody>
        <tr><td><code>MemoryStore</code></td><td>Per-Puma-worker memory — hit ratio divided by worker count, breaks 10:1 requirement.</td></tr>
        <tr><td><code>SolidCache</code></td><td>SQLite-based; no atomic <code>INCR</code> for quota; row-level lock contention.</td></tr>
        <tr><td><b>Redis</b> &#10003;</td><td>Cross-worker sharing; atomic primitives (<code>SET NX</code>, <code>INCR</code>, <code>EXPIREAT</code>) solve cache, lock, and quota with one dependency.</td></tr>
      </tbody>
    </table>
    <p><b>Trade-off:</b> one extra service in <code>docker-compose.yml</code>. Worth it — Redis is ubiquitous in Rails production.</p>
  </div>
</div>

<div class="decision" data-id="d3">
  <div class="decision-header" onclick="toggleDecision(this)">
    <div class="decision-num">3</div>
    <div class="decision-title">Thundering herd protection <span style="color:#64748b; font-size:0.85rem; font-weight:400;">(L2 Lock)</span></div>
    <div class="decision-choice">Redis SET NX lock</div>
    <div class="decision-arrow">&#9656;</div>
  </div>
  <div class="decision-body">
    <p>Without coalescing, a 50-request burst burns 50 units of the daily budget in milliseconds. Redis <code>SET NX</code> elects one leader across all Puma workers; followers poll the cache.</p>

    <pre><span class="comment">// LockAndFetchRate pseudocode:</span>
token = SecureRandom.uuid                              <span class="comment">// per-leader fencing token</span>
<span class="keyword">if</span> SET NX <span class="string">"lock:bulk_fetch"</span> = token (TTL 7s) &rarr; leader
   yield                                              <span class="comment">// fetch upstream, write cache</span>
   Lua: <span class="keyword">if</span> GET == token <span class="keyword">then</span> DEL          <span class="comment">// release only if still ours</span>
<span class="keyword">else</span> &rarr; follower: poll cache every 50ms up to 6s</pre>

    <p><b style="color:#f59e0b;">Fencing token:</b> each leader holds a unique UUID. On release, a Lua script checks "still mine?" before deleting &mdash; otherwise a slow leader could wipe the new leader's lock and let a third request slip in.</p>

    <p style="background:#1e293b40; border-left:3px solid #f59e0b; padding:10px 14px; border-radius:0 6px 6px 0; margin-top:8px;"><b style="color:#f59e0b;">Single-Redis assumption:</b> under Sentinel / Cluster HA, primary failover can briefly produce two leaders. Production HA wants a Raft-based coordinator (etcd / Consul). QuotaGuard's atomic counter is a second line of defence &mdash; even if two leaders co-exist briefly, the daily cap still holds.</p>
  </div>
</div>

<div class="decision" data-id="d4">
  <div class="decision-header" onclick="toggleDecision(this)">
    <div class="decision-num">4</div>
    <div class="decision-title">Quota protection <span style="color:#64748b; font-size:0.85rem; font-weight:400;">(L3 Quota)</span></div>
    <div class="decision-choice">Redis atomic counter</div>
    <div class="decision-arrow">&#9656;</div>
  </div>
  <div class="decision-body">
    <p>The upstream limit is 1,000 calls per day &mdash; not per second. So we need a simple counter that resets at midnight.</p>

    <h5 style="color:#94a3b8; text-transform:uppercase; font-size:0.78rem; letter-spacing:0.08em; margin:18px 0 6px;">Why this layer exists</h5>
    <p>Batch Fetch already keeps the theoretical max at <b>288 calls/day</b> &mdash; well under budget. Under normal operation, QuotaGuard never triggers.</p>
    <p>The honest remaining value is <b style="color:#f59e0b;">defensive client behavior</b>: we cap our own call rate at 1,000/day even if upstream's own rate limiter fails to enforce it (bug, redeploy, staging quirk). In that edge case our overflow would otherwise hit upstream's <b style="color:#ef4444;">computationally expensive</b> inference and burn real compute. QuotaGuard prevents that.</p>
    <div style="background:#1e293b40; border-left:3px solid #f59e0b; padding:10px 14px; border-radius:0 6px 6px 0; margin-top:8px;">
      <p style="margin:0 0 6px;"><b style="color:#f59e0b;">Trade-offs accepted:</b></p>
      <ul style="margin:0 0 0 18px; font-size:0.95rem;">
        <li><b>Duplicated state</b> &mdash; the cap is enforced in two places (upstream &amp; here). If upstream relaxes to 2,000, <code>DAILY_LIMIT</code> needs updating too.</li>
        <li><b>Added complexity</b> &mdash; ~50 lines of code + tests + a Redis dependency for a layer that should never trigger in normal operation. A minimalist approach would skip QuotaGuard and trust upstream's own 429, accepting the small latency / observability cost.</li>
      </ul>
    </div>

    <h5 style="color:#94a3b8; text-transform:uppercase; font-size:0.78rem; letter-spacing:0.08em; margin:18px 0 6px;">Why Redis</h5>
    <p>The counter must be shared across all Puma workers (separate processes), and <code>INCR</code> is atomic &mdash; it increments and returns the new value in one step, so two workers can never both read 999 and both pass the check.</p>

    <h5 style="color:#94a3b8; text-transform:uppercase; font-size:0.78rem; letter-spacing:0.08em; margin:18px 0 6px;">Implementation</h5>
    <ul style="margin:6px 0 8px 20px;">
      <li><code>INCR</code> on <code>quota:YYYY-MM-DD</code> &mdash; atomic, cross-worker</li>
      <li>Runs only on cache misses inside the lock &mdash; cached responses never touch the counter</li>
      <li>Cap is exactly 1,000 (not lower) because <code>INCR</code> is atomic &mdash; no way to overshoot</li>
    </ul>

    <h5 style="color:#94a3b8; text-transform:uppercase; font-size:0.78rem; letter-spacing:0.08em; margin:18px 0 6px;">Hardening</h5>
    <ul style="margin:6px 0 8px 20px;">
      <li><b>Counter survives restart</b> &mdash; Redis AOF persistence + persistent volume. Without this, a Redis restart wipes the counter and the cap could be exceeded across restarts.</li>
      <li><b>Refund never goes negative</b> &mdash; <code>refund_quota!</code> wraps DECR in a Lua script that only runs when counter is above zero. Without this, burst 401s before any INCR would push counter negative, letting subsequent INCRs silently exceed 1,000.</li>
    </ul>

    <h5 style="color:#94a3b8; text-transform:uppercase; font-size:0.78rem; letter-spacing:0.08em; margin:18px 0 6px;">Assumption</h5>
    <p>Quota resets at <span class="highlight">UTC midnight</span>. The upstream docs don't specify when the daily limit resets, so we assume UTC 00:00. The Redis key uses <code>quota:YYYY-MM-DD</code> (UTC) and <code>Retry-After</code> counts seconds until UTC midnight. If the actual reset time differs, only these two values need updating.</p>
  </div>
</div>

<div class="decision" data-id="d5">
  <div class="decision-header" onclick="toggleDecision(this)">
    <div class="decision-num">5</div>
    <div class="decision-title">Failure strategy</div>
    <div class="decision-choice">Fail-closed</div>
    <div class="decision-arrow">&#9656;</div>
  </div>
  <div class="decision-body">
    <p>When a dependency dies (Redis, upstream, lock), what should the service do? There are four common strategies — each with a different priority.</p>

    <table style="margin: 14px 0;">
      <thead>
        <tr><th>Strategy</th><th>What it does</th><th>Protects</th><th>Sacrifices</th></tr>
      </thead>
      <tbody>
        <tr style="background:#10b98115;">
          <td><b style="color:#10b981;">✓ Fail-closed</b><br><span style="font-size:0.82rem; color:#94a3b8;">My choice</span></td>
          <td>Dependency dies → return 5xx, never call upstream</td>
          <td>Upstream contract (1000/day cap)</td>
          <td>Own service uptime</td>
        </tr>
        <tr>
          <td>Fail-open</td>
          <td>Dependency dies → bypass protection, hit upstream directly</td>
          <td>Own uptime</td>
          <td>Quota burns fast; thundering herd unblocked</td>
        </tr>
        <tr>
          <td>Graceful degradation</td>
          <td>Return stale cache, default value, or partial response</td>
          <td>User experience</td>
          <td>Data freshness / correctness</td>
        </tr>
        <tr>
          <td>Fail-fast + retry</td>
          <td>Return 5xx, expect client to retry with backoff</td>
          <td>Same as fail-closed but pushes retry to caller</td>
          <td>Assumes well-behaved client</td>
        </tr>
      </tbody>
    </table>

    <p><b>Why fail-closed for this service:</b> two spec rules forced it.</p>
    <ol style="margin-left:20px;">
      <li><b>"Rate must be no older than 5 minutes"</b> → can't return stale data → rules out graceful degradation.</li>
      <li><b>"1,000 calls/day per token" (hard contract)</b> → can't let failures leak through to upstream → rules out fail-open.</li>
    </ol>
    <p>Once those two are eliminated, fail-closed is the only honest choice. Fail-fast + retry is functionally equivalent but offloads correctness to the client; for a proxy, owning that responsibility is cleaner.</p>

    <p><b>When I'd choose differently:</b></p>
    <ul style="margin-left:20px;">
      <li><b>Recommendation API</b> — graceful degradation. Returning popular items is better than no items.</li>
      <li><b>Like / view counter</b> — fail-open. A few extra writes is harmless.</li>
      <li><b>Internal analytics dashboard</b> — fail-open with a banner. Operators can judge stale data themselves.</li>
    </ul>
    <p>The right choice always depends on whether <b>"wrong data" or "no data" is more harmful</b>. For pricing, wrong data wins.</p>
  </div>
</div>

<div class="decision" data-id="d6">
  <div class="decision-header" onclick="toggleDecision(this)">
    <div class="decision-num">6</div>
    <div class="decision-title">Error handling</div>
    <div class="decision-choice">Distinct HTTP status per failure</div>
    <div class="decision-arrow">&#9656;</div>
  </div>
  <div class="decision-body">

    <div class="comparison">
      <div class="side before">
        <h4>&#10007; Before</h4>
        <p style="font-size:0.92rem;">Every upstream failure — 401, 5xx, timeout — returned <code>400 Bad Request</code>. The client had no way to distinguish a bad request from a server-side failure.</p>
      </div>
      <div class="side after">
        <h4>&#10003; After</h4>
        <p style="font-size:0.92rem;">Each failure maps to a distinct HTTP status. The client knows exactly what happened and whether to fix the request, retry, or escalate.</p>
      </div>
    </div>

    <div class="finding info" style="margin-bottom:18px;">
      <div class="finding-title">Why this matters — upstream has high failure rates</div>
      <div class="finding-row"><span class="finding-label">~7%</span><span class="finding-value">HTTP 500 from upstream</span></div>
      <div class="finding-row"><span class="finding-label">~7%</span><span class="finding-value">Timeout</span></div>
      <div class="finding-row"><span class="finding-label">~7%</span><span class="finding-value">HTTP 200 with error body <code style="font-size:0.82rem;">{"message":"Failed to process rates...","status":"error"}</code></span></div>
      <div class="finding-row"><span class="finding-label">~7%</span><span class="finding-value">HTTP 200 with <code>rate</code> field missing from response</span></div>
      <p style="margin-top:10px; margin-bottom:0; font-size:0.88rem; color:#64748b;">From 1,001 live test calls — see <code>UPSTREAM_BEHAVIOR.md</code> for full pattern tables.</p>
    </div>

    <p><span style="display:inline-block; background:#38bdf820; color:#38bdf8; border:1px solid #38bdf8; border-radius:5px; padding:2px 12px; font-weight:700; font-size:0.95rem; letter-spacing:0.03em;">Anti-Corruption Layer (ACL)</span> &nbsp;<code>RateApiClient</code> absorbs all upstream quirks and exposes a clean typed interface. <code>PricingService</code> never touches a raw HTTP response:</p>

    <div class="flow" style="margin: 18px 0;">

      <!-- Chaos zone -->
      <div style="background:#ef444420; border:2px solid #ef4444; border-radius:8px; padding:14px 24px; text-align:center; min-width:400px;">
        <div style="font-size:0.72rem; color:#ef444490; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px;">&#9888; unstable, unpredictable</div>
        <div style="font-size:1rem; font-weight:700; color:#ef4444;">upstream rate-api</div>
        <div class="detail" style="color:#ef444480;">runs expensive ML inference; ~28% failure rate — 5xx &nbsp;·&nbsp; timeout &nbsp;·&nbsp; HTTP 200 with error body &nbsp;·&nbsp; HTTP 200 with missing rate field</div>
      </div>

      <div class="flow-arrow">&#9660;</div>

      <!-- RateApiClient — the star, IS the ACL -->
      <div style="background:#38bdf818; border:2px solid #38bdf8; border-radius:8px; padding:14px 24px; text-align:center; min-width:400px; box-shadow:0 0 18px #38bdf825;">
        <div style="margin-bottom:8px;"><span style="font-size:0.88rem; font-weight:800; color:#38bdf8; background:#0f172a; border:2px solid #38bdf8; border-radius:5px; padding:4px 14px; letter-spacing:0.06em; box-shadow:0 0 10px #38bdf850;">Anti-Corruption Layer</span></div>
        <div style="font-size:1.05rem; font-weight:800; color:#38bdf8;">RateApiClient</div>
        <div class="detail" style="color:#38bdf8cc; margin-bottom:4px;">makes HTTP call &nbsp;·&nbsp; parses response &nbsp;·&nbsp; returns clean <code style="color:#38bdf8;">Integer</code> on success</div>
        <div class="detail"><span style="color:#38bdf880;">any failure → typed exception: UnauthorizedError &nbsp;·&nbsp; QuotaExhaustedError &nbsp;·&nbsp; TimeoutError &nbsp;·&nbsp; UpstreamError</span></div>
      </div>

      <div class="flow-arrow">&#9660;</div>

      <!-- PricingService — secondary -->
      <div style="background:#1e293b; border:1px solid #334155; border-radius:8px; padding:12px 24px; text-align:center; min-width:400px;">
        <div style="font-size:0.95rem; font-weight:600; color:#94a3b8;">PricingService</div>
        <div class="detail" style="color:#64748b;">orchestrates cache → lock → quota → fetch; never touches raw HTTP; catches each typed exception and assembles the correct HTTP status + client message</div>
      </div>

      <div class="flow-arrow" style="color:#475569;">&#9660;</div>

      <div style="background:#1e293b; border:1px solid #334155; border-radius:8px; padding:12px 24px; text-align:center; min-width:400px;">
        <div style="font-size:0.95rem; font-weight:600; color:#94a3b8;">Controller</div>
        <div class="detail" style="color:#64748b;">validates params (period &nbsp;·&nbsp; hotel &nbsp;·&nbsp; room); renders the JSON response with status from PricingService</div>
      </div>

    </div>

    <table>
      <thead><tr><th>Situation</th><th>Who raises</th><th>Client status</th><th>Client message</th><th>Client action</th></tr></thead>
      <tbody>
        <tr><td>Invalid params</td><td>Controller</td><td><span class="status-badge s-400">400</span></td><td>Missing required parameters / Invalid period</td><td>Fix request</td></tr>
        <tr><td>Daily quota used up</td><td>QuotaGuard</td><td><span class="status-badge s-429">429</span></td><td>Daily quota reached — requests resume at midnight UTC</td><td>Wait for Retry-After</td></tr>
        <tr><td>Upstream returns HTTP 429 (token limit)</td><td>RateApiClient</td><td><span class="status-badge s-429">429</span></td><td>Upstream API quota exhausted — token limit reached</td><td>Wait for Retry-After</td></tr>
        <tr><td>Bad token (401)</td><td>RateApiClient</td><td><span class="status-badge s-502">502</span></td><td>Upstream authentication failed</td><td>—</td></tr>
        <tr><td>Upstream 200 with error body</td><td>RateApiClient</td><td><span class="status-badge s-502">502</span></td><td>Upstream error</td><td>—</td></tr>
        <tr><td>Upstream 200, rate field absent</td><td>RateApiClient</td><td><span class="status-badge s-502">502</span></td><td>Upstream error</td><td>—</td></tr>
        <tr><td>Upstream 5xx</td><td>RateApiClient</td><td><span class="status-badge s-502">502</span></td><td>Upstream error</td><td>—</td></tr>
        <tr><td>Upstream timeout</td><td>RateApiClient</td><td><span class="status-badge s-504">504</span></td><td>Upstream timed out</td><td>—</td></tr>
        <tr><td>Follower waited too long</td><td>LockAndFetchRate</td><td><span class="status-badge s-504">504</span></td><td>Request timed out waiting for upstream result</td><td>—</td></tr>
        <tr><td>Unexpected error</td><td>StandardError catch-all</td><td><span class="status-badge s-500">500</span></td><td>Unexpected error</td><td>—</td></tr>
      </tbody>
    </table>
    <p>Both 429 responses include a <code>Retry-After</code> header (seconds until UTC midnight). All other error responses return only the status code and message — no retry guidance is provided.</p>
  </div>
</div>

<div class="decision" data-id="d7">
  <div class="decision-header" onclick="toggleDecision(this)">
    <div class="decision-num">7</div>
    <div class="decision-title">Observability</div>
    <div class="decision-choice">Lograge structured logs</div>
    <div class="decision-arrow">&#9656;</div>
  </div>
  <div class="decision-body">
    <p>Every request emits a single JSON log line with: <code>method</code>, <code>path</code>, <code>status</code>, <code>duration</code>, <code>cache_status</code> (<code>"hit"</code> or <code>"miss"</code>), and <code>upstream_latency_ms</code>.</p>
    <pre><span class="comment">// Example log line:</span>
{"method":"GET","path":"/api/v1/pricing","status":<span class="number">200</span>,"duration":<span class="number">12.3</span>,
 "cache_status":"<span class="string">hit</span>","upstream_latency_ms":<span class="keyword">null</span>}</pre>
    <p><b>Why Lograge over paid services (Datadog, New Relic):</b> Lograge is free, zero config, and ships with Rails. For a case study like this, structured JSON logs are enough to prove the observability mindset. In production, these same JSON lines can be piped into any log aggregator.</p>
    <p><b>Why this matters:</b> "How would you know this service is healthy in production?" has a concrete answer — filter by <code>cache_status=miss</code>, watch <code>upstream_latency_ms</code>.</p>
  </div>
</div>

<div class="decision" data-id="d8">
  <div class="decision-header" onclick="toggleDecision(this)">
    <div class="decision-num">8</div>
    <div class="decision-title">Testing strategy</div>
    <div class="decision-choice">WebMock</div>
    <div class="decision-arrow">&#9656;</div>
  </div>
  <div class="decision-body">
    <p>All test files follow a consistent section structure: <b>Happy path &rarr; Fail path &rarr; Edge/Boundary &rarr; Isolation</b>. Coverage measured with SimpleCov — currently <span class="highlight">100%</span> (scaffold files excluded).</p>
    <p><b>Why WebMock over .stub:</b> Stubbing <code>RateApiClient.get_all_rates</code> directly bypasses the HTTP layer, hiding timeout, header, and retry behaviour. WebMock intercepts at the socket layer, producing more realistic tests.</p>
  </div>
</div>

<!-- ==================== Failure Modes ==================== -->
<section id="failures">
<h2>Failure Modes</h2>
<p style="color:#94a3b8; margin-top:-8px; margin-bottom:18px;">What happens when each dependency fails, and why the 1000/day cap still holds.</p>

<table>
  <thead>
    <tr><th>What fails</th><th>What happens inside</th><th>Client sees</th><th>Upstream impact</th><th>Recovery</th></tr>
  </thead>
  <tbody>
    <tr>
      <td><b>Redis fully down</b><br><span style="font-size:0.82rem; color:#94a3b8;">e.g. crash, OOM, network partition</span></td>
      <td>Rails' built-in cache error handler swallows the Redis error and returns nil &rarr; <code>Rails.cache.write(..., unless_exist: true)</code> returns nil &rarr; LockAndFetchRate falls into the follower branch &rarr; <code>poll_for_result</code> sees nil for 6s &rarr; raises <code>LockAndFetchRate::TimeoutError</code></td>
      <td><span class="status-badge s-504">504</span> "Request timed out waiting for upstream result"</td>
      <td><b style="color:#10b981;">0 calls</b> &mdash; no one acquires the lock, so upstream is never reached</td>
      <td>Service recovers immediately when Redis comes back online (verified by the <a href="#verified">Fail-closed when Redis dies</a> test in Load &amp; Chaos Tests)</td>
    </tr>
    <tr>
      <td><b>Redis restart</b><br><span style="font-size:0.82rem; color:#94a3b8;">e.g. deploy, OOM, container restart</span></td>
      <td>AOF replays everything back — cache, lock, counter — with their original expiry times. Stale lock self-expires within 7s (same as leader crash); cache stays inside the 5-min freshness window; counter resumes counting. Up to ~1s of writes may be lost (<code>appendfsync everysec</code> default).</td>
      <td>Brief unavailability during restart (a few seconds); reads resume normally after AOF replay</td>
      <td><b style="color:#10b981;">0 calls</b> &mdash; cache and counter both survive; nothing extra to fetch</td>
      <td>Self-healing via AOF + persistent volume. The 1000/day cap holds <b>across restarts</b>, not just within a single uptime.</td>
    </tr>
    <tr>
      <td><b>Leader crashes mid-fetch</b><br><span style="font-size:0.82rem; color:#94a3b8;">e.g. <code>kill -9</code>, OOM, container restart</span></td>
      <td><code>ensure</code> never runs &rarr; lock stays held until 7s auto-expire &rarr; followers wait then time out at 6s. <b style="color:#f59e0b;">Each leader holds a unique UUID (fencing token)</b>, so a slow leader waking up after expiry won't accidentally delete the new leader's lock.</td>
      <td><span class="status-badge s-504">504</span> "Request timed out waiting for upstream result"</td>
      <td><b style="color:#10b981;">≤1 call</b> &mdash; 0 if leader crashed before calling upstream, 1 if it crashed during or after</td>
      <td>Wait up to 7s for the lock to auto-expire (that's the lock TTL). Then the next request takes over as new leader.</td>
    </tr>
    <tr>
      <td><b>Upstream timeout</b><br><span style="font-size:0.82rem; color:#94a3b8;">5s HTTPParty timeout (~7%)</span></td>
      <td>RateApiClient catches <code>Net::ReadTimeout</code>, raises TimeoutError &rarr; lock released</td>
      <td><span class="status-badge s-504">504</span> "Upstream timed out"</td>
      <td><b style="color:#10b981;">1 call</b> &mdash; quota consumed for the failed attempt</td>
      <td>Next request becomes new leader and retries upstream.</td>
    </tr>
    <tr>
      <td><b>Upstream HTTP 5xx</b><br><span style="font-size:0.82rem; color:#94a3b8;">~7% rate observed in <a href="upstream_behavior.html">live testing</a></span></td>
      <td>RateApiClient sees non-200 status, raises UpstreamError &rarr; lock released, cache not written</td>
      <td><span class="status-badge s-502">502</span> "Upstream error"</td>
      <td><b style="color:#10b981;">1 call</b> &mdash; quota consumed for the failed attempt</td>
      <td>Next request becomes new leader and retries upstream.</td>
    </tr>
    <tr>
      <td><b>Upstream returns 200 with error body</b><br><span style="font-size:0.82rem; color:#94a3b8;">~7% rate observed in <a href="upstream_behavior.html">live testing</a></span></td>
      <td>RateApiClient parses body, sees no <code>rate</code> field, raises UpstreamError &rarr; lock released, cache not written</td>
      <td><span class="status-badge s-502">502</span> "Upstream error"</td>
      <td><b style="color:#10b981;">1 call burned</b> &mdash; but we deliberately don't cache the bad response. Next request retries, no stale garbage stuck in cache.</td>
      <td>Next request becomes new leader and retries upstream.</td>
    </tr>
    <tr>
      <td><b>Upstream returns garbage values</b><br><span style="font-size:0.82rem; color:#94a3b8;">unknown hotel, zero/negative rate, decimal strings, missing fields</span></td>
      <td>RateApiClient runs each record through a <b style="color:#f59e0b;">dry-schema</b> + positive-numeric check. Bad records are logged and skipped; the rest still get cached.</td>
      <td>Service still returns the requested rate if it survived validation, otherwise <span class="status-badge s-502">502</span></td>
      <td><b style="color:#10b981;">1 call</b> &mdash; partial response still better than zero</td>
      <td>One bad row doesn't deny cache to 35 good rows. If <i>every</i> record is invalid the whole response is rejected.</td>
    </tr>
    <tr>
      <td><b>Upstream 401 (auth failure)</b><br><span style="font-size:0.82rem; color:#94a3b8;">e.g. token rotation needed</span></td>
      <td>RateApiClient raises UnauthorizedError &rarr; PricingService catches &rarr; <b>refunds the quota unit</b> (the call was rejected before processing)</td>
      <td><span class="status-badge s-502">502</span> "Upstream authentication failed"</td>
      <td><b style="color:#10b981;">1 call but quota refunded</b> &mdash; <code>QuotaGuard.refund_quota!</code> ensures bad tokens don't burn budget</td>
      <td>Operator must rotate token. Until then, every cache miss costs 1 quota then refunds &mdash; budget stays intact.</td>
    </tr>
    <tr>
      <td><b>Upstream HTTP 429 (their rate limit)</b><br><span style="font-size:0.82rem; color:#94a3b8;">~0.1% observed — upstream's daily limit hit</span></td>
      <td>RateApiClient raises QuotaExhaustedError &rarr; PricingService catches</td>
      <td><span class="status-badge s-429">429</span> + <code>Retry-After</code> header</td>
      <td><b style="color:#10b981;">1 call</b> &mdash; rejected call still counts upstream-side</td>
      <td>Wait until upstream's window resets (assumed UTC midnight, see D4). Our QuotaGuard catches the same condition locally before the call — this row is the rare race where our counter and upstream's diverge.</td>
    </tr>
    <tr>
      <td><b>Quota counter at 1000</b><br><span style="font-size:0.82rem; color:#94a3b8;">budget exhausted for the day</span></td>
      <td>QuotaGuard's atomic INCR returns 1001 &rarr; raises ExhaustedError <b>before</b> RateApiClient is called</td>
      <td><span class="status-badge s-429">429</span> + <code>Retry-After</code> header (seconds until UTC midnight)</td>
      <td><b style="color:#10b981;">0 calls</b> &mdash; the deterministic guarantee that 1000 is never exceeded (verified by the <a href="#verified">Quota hard cap</a> test in Load &amp; Chaos Tests)</td>
      <td>Counter auto-resets at UTC midnight via <code>EXPIREAT</code>. <b>Users hitting cache still get their rate</b> — only fresh fetches get blocked.</td>
    </tr>
  </tbody>
</table>

<div class="card blue" style="margin-top:18px;">
  <h4>Design principle</h4>
  <p>Every dependency failure routes to a 5xx response. The service <b>never</b> calls upstream when its protection layers (cache / lock / quota) are degraded. This is "fail-closed" — protect the upstream contract at the cost of own uptime, which is the right priority for a proxy.</p>
</div>

</section>

<!-- ==================== Upstream API ==================== -->
<section id="upstream">
<h2>Upstream API Findings</h2>
<p>Two live test runs — 1001 calls each — against the upstream rate API, run before implementation. <span style="color:#ef4444;font-weight:600;">~28% failure rate</span> across 4 distinct failure modes, all confirmed in both single and bulk requests.</p>

<div class="finding danger">
  <div class="finding-title" style="font-size:1.08rem;font-weight:700;color:#f1f5f9;">HTTP 200 does not mean success</div>
  <div class="finding-row"><span class="finding-label">Finding</span><span class="finding-value">Upstream returns <span class="status-badge s-200">200</span> for three distinct failure modes: error body with no <code>rates</code> key (~7%), <code>rate</code> field silently absent from response (~7%), and empty <code>rates</code> array. HTTP status alone cannot be trusted.</span></div>
  <div class="finding-row"><span class="finding-label">Decision</span><span class="finding-value"><code>RateApiClient</code> inspects the response body on every 200 — each failure mode raises <code>UpstreamError</code>, never returns nil silently.</span></div>
</div>

<div class="finding warn">
  <div class="finding-title" style="font-size:1.08rem;font-weight:700;color:#f1f5f9;">Missing <code>rate</code> field is not quota exhaustion</div>
  <div class="finding-row"><span class="finding-label">Finding</span><span class="finding-value">Initial design assumed a missing <code>rate</code> field meant quota was exhausted. Testing proved otherwise — the missing field is an intermittent processing error (~7% regardless of quota). Quota exhaustion has its own signal: <span class="status-badge s-429">429</span> with <code>{"error":"Rate limit exceeded (1000/day)"}</code>.</span></div>
  <div class="finding-row"><span class="finding-label">Decision</span><span class="finding-value">Map HTTP 429 → <code>QuotaExhaustedError</code>. Map missing rate → <code>UpstreamError</code>. Two separate exceptions, two separate response paths.</span></div>
</div>

<div class="finding warn">
  <div class="finding-title" style="font-size:1.08rem;font-weight:700;color:#f1f5f9;">401 does not consume upstream quota — refund on auth failure</div>
  <div class="finding-row"><span class="finding-label">Finding</span><span class="finding-value">Empirically verified: 1000 invalid-token calls followed by a valid call returned 200, not 429. Upstream rejects 401s before any processing occurs.</span></div>
  <div class="finding-row"><span class="finding-label">Decision</span><span class="finding-value"><code>QuotaGuard</code> pre-consumes one unit before every upstream call. On 401, it refunds the unit — the request never reached upstream processing.</span></div>
</div>

<div style="margin-top:20px;text-align:center;">
  <a href="upstream_behavior.html" class="report-link">Full test data &amp; error mapping &rarr;</a>
</div>
</section>

<!-- ==================== Load & Chaos Tests ==================== -->
<section id="verified">
<h2>Load &amp; Chaos Tests</h2>

<p style="color:#94a3b8; margin-bottom:16px;">Unit tests prove the code is correct. <b>Load tests prove it works under real traffic.</b> I ran 4 tests against the live app (Rails + Redis + rate-api) — here's what each one asks and what I measured.</p>

<table>
  <thead>
    <tr><th>What I'm testing</th><th>The question</th><th>What I measured</th><th></th></tr>
  </thead>
  <tbody>
    <tr>
      <td><b>Single-flight lock</b></td>
      <td>If 50 users hit the API at the same time on a cold cache, do they all hammer the upstream — or does my lock collapse them into one call?</td>
      <td><b>1,404 client requests → 1 upstream call</b><br><span style="color:#64748b; font-size:0.88rem;">5 seconds at 50 concurrent connections</span></td>
      <td><span style="color:#10b981; font-weight:700;">✓ PASS</span></td>
    </tr>
    <tr>
      <td><b>Cache hit rate</b></td>
      <td>Under steady traffic, what percent of requests are served from cache vs. hitting the upstream?</td>
      <td><b>99.93% hit rate</b><br><span style="color:#64748b; font-size:0.88rem;">7,081 hits / 5 misses in 30 seconds</span></td>
      <td><span style="color:#10b981; font-weight:700;">✓ PASS</span></td>
    </tr>
    <tr>
      <td><b>Quota hard cap</b></td>
      <td>If something goes wrong and we approach the 1,000/day upstream limit, does the 1,001st call get blocked — or does it leak through?</td>
      <td><b>HTTP 429 returned, 0 upstream calls</b><br><span style="color:#64748b; font-size:0.88rem;">Set counter to 1000, next request blocked with <code>Retry-After: 31254s</code> (until UTC midnight)</span></td>
      <td><span style="color:#10b981; font-weight:700;">✓ PASS</span></td>
    </tr>
    <tr>
      <td><b>Fail-closed when Redis dies</b></td>
      <td>If Redis crashes, does the service keep accidentally calling upstream — or does it shut the door cleanly?</td>
      <td><b>5/5 requests blocked, 0 upstream calls</b><br><span style="color:#64748b; font-size:0.88rem;">All returned HTTP 504; service auto-recovered when Redis came back</span></td>
      <td><span style="color:#10b981; font-weight:700;">✓ PASS</span></td>
    </tr>
  </tbody>
</table>

<p style="margin-top:14px; font-size:0.92rem; color:#64748b;"><b>Try it yourself:</b> <code>cd load_test &amp;&amp; ./run_all.sh</code> (~6 minutes total) or <code>DURATION=30s ./run_all.sh</code> (~1 minute smoke test).</p>
</section>

<script>
const LABELS = {
  zh: { challenge:'問題背景', funnel:'解決方案', architecture:'系統架構', cache:'RateCache', lock:'LockAndFetchRate', quota:'QuotaGuard', batch:'Batch Fetch', flow:'請求流程', decisions:'設計決策', failures:'故障情境', upstream:'API 觀察', verified:'壓力與混沌測試' },
  en: { challenge:'Challenge', funnel:'Solution', architecture:'Architecture', cache:'RateCache', lock:'LockAndFetchRate', quota:'QuotaGuard', batch:'Batch Fetch', flow:'Request Flow', decisions:'Decisions', failures:'Failure Modes', upstream:'API Findings', verified:'Load & Chaos Tests' }
};
const CURRENT_LABEL = { zh: '目前區塊：', en: 'Current section: ' };
const HINT_TEXT = { zh: '點選區塊快速跳轉', en: 'Click a section to jump to it.' };

let sectionLabels, sections, navLinks, hint, navWrap, navOriginalTop;
let navHeightSpacer = null, hasScrolled = false, currentLang = 'zh', clickLockUntil = 0;

function setActive(current) {
  navLinks.forEach(a => {
    const href = a.getAttribute('href').slice(1);
    if (href === current) { a.classList.add('active'); a.classList.remove('idle'); }
    else { a.classList.remove('active'); a.classList.remove('idle'); }
  });
  if (!hasScrolled) { hasScrolled = true; hint.classList.add('scrolled'); }
  hint.innerHTML = CURRENT_LABEL[currentLang] + '<span style="color:#38bdf8; font-weight:600;">' + sectionLabels[current] + '</span>';
}
function updateActiveSection() {
  if (!sections) return;
  let current = sections[0];
  for (const id of sections) {
    const el = document.getElementById(id);
    if (el && el.getBoundingClientRect().top <= 170) current = id;
  }
  setActive(current);
}
function updateNavFixed() {
  if (!navWrap) return;
  if (window.scrollY >= navOriginalTop) {
    if (!navWrap.classList.contains('fixed')) {
      const h = navWrap.offsetHeight;
      navWrap.classList.add('fixed');
      if (!navHeightSpacer) {
        navHeightSpacer = document.createElement('div');
        navHeightSpacer.style.height = h + 'px';
        navWrap.parentNode.insertBefore(navHeightSpacer, navWrap);
      }
    }
  } else if (navWrap.classList.contains('fixed')) {
    navWrap.classList.remove('fixed');
    if (navHeightSpacer) { navHeightSpacer.remove(); navHeightSpacer = null; }
  }
}
function bindNav() {
  navLinks.forEach(a => a.addEventListener('click', () => {
    setActive(a.getAttribute('href').slice(1));
    clickLockUntil = Date.now() + 1500;
  }));
}
function render(lang) {
  currentLang = lang;
  sectionLabels = LABELS[lang];
  sections = Object.keys(sectionLabels);
  if (navHeightSpacer) { navHeightSpacer.remove(); navHeightSpacer = null; }
  const content = document.getElementById('content');
  content.innerHTML = '';
  content.appendChild(document.getElementById('tpl-' + lang).content.cloneNode(true));
  document.documentElement.lang = (lang === 'zh') ? 'zh-TW' : 'en';
  navLinks = document.querySelectorAll('#nav a');
  hint = document.getElementById('nav-hint');
  navWrap = document.getElementById('nav-wrap');
  if (hint) hint.textContent = HINT_TEXT[lang];
  hasScrolled = false;
  navWrap.classList.remove('fixed');
  navOriginalTop = navWrap.getBoundingClientRect().top + window.scrollY;
  bindNav();
  document.querySelectorAll('.lang-toggle button').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  updateNavFixed();
  updateActiveSection();
  try { localStorage.setItem('icg-lang', lang); } catch (e) {}
}
window.addEventListener('scroll', () => {
  updateNavFixed();
  if (Date.now() < clickLockUntil) return;
  updateActiveSection();
}, { passive: true });
function toggleDecision(header) { header.parentElement.classList.toggle('open'); }
function copyCmd(btn) {
  const text = btn.parentElement.querySelector('code').textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}
document.querySelectorAll('.lang-toggle button').forEach(b => b.addEventListener('click', () => render(b.dataset.lang)));
let saved = 'en';
try { saved = localStorage.getItem('icg-lang') || 'en'; } catch (e) {}
render(saved);
</script>
